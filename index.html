<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1f3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場会話">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<title>現場会話</title>
<style>
:root {
  --bg-deep: #0a1628;
  --bg-card: rgba(255,255,255,0.06);
  --bg-card-solid: #1a2d4a;
  --bg-active: rgba(99,179,237,0.15);
  --accent: #63b3ed;
  --accent-soft: rgba(99,179,237,0.2);
  --accent-glow: rgba(99,179,237,0.4);
  --text-primary: #f0f4f8;
  --text-secondary: rgba(240,244,248,0.6);
  --text-muted: rgba(240,244,248,0.35);
  --border: rgba(255,255,255,0.1);
  --border-active: rgba(99,179,237,0.5);
  --glass: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.12);
  --danger: #fc8181;
  --success: #68d391;
  --font: 'Noto Sans JP', -apple-system, sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg-deep);font-family:var(--font);}

/* Mesh gradient background */
body::before {
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(99,179,237,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(104,211,145,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(159,122,234,0.06) 0%, transparent 60%),
    linear-gradient(135deg, #0a1628 0%, #0f2040 50%, #0a1628 100%);
  pointer-events:none;
}

#app{
  position:relative;z-index:1;
  max-width:430px;height:100vh;
  margin:0 auto;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ══ SETUP SCREEN ══ */
#setup{
  position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#setup::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(99,179,237,0.2) 0%, transparent 60%),
    linear-gradient(180deg, #0a1628 0%, #0f2040 100%);
}
#setup.hidden{display:none;}

.setup-hero{
  position:relative;z-index:1;
  padding:max(env(safe-area-inset-top),40px) 24px 24px;
  text-align:center;
  flex-shrink:0;
}
.setup-logo{
  font-size:48px;margin-bottom:12px;
  filter:drop-shadow(0 0 20px rgba(99,179,237,0.4));
}
.setup-tagline{
  font-size:22px;font-weight:700;
  color:var(--text-primary);
  line-height:1.4;margin-bottom:8px;
  letter-spacing:-0.3px;
}
.setup-tagline span{
  background:linear-gradient(135deg, #63b3ed, #68d391);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.setup-sub{
  font-size:13px;color:var(--text-secondary);
  line-height:1.6;
}

.setup-body{
  position:relative;z-index:1;
  flex:1;overflow-y:auto;
  padding:0 16px 8px;
  -webkit-overflow-scrolling:touch;
}
.setup-label{
  font-size:11px;font-weight:700;
  color:var(--text-muted);
  letter-spacing:1.5px;text-transform:uppercase;
  margin:0 4px 10px;
}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.scard{
  padding:16px 10px;border-radius:16px;
  border:1px solid var(--glass-border);
  background:var(--glass);
  backdrop-filter:blur(12px);
  color:var(--text-primary);
  cursor:pointer;font-family:var(--font);
  text-align:center;
  transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.scard:active{transform:scale(0.96);}
.scard.selected{
  border-color:var(--border-active);
  background:var(--bg-active);
  box-shadow:0 0 20px var(--accent-glow);
}
.scard .si{font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));}
.scard .sn{font-size:13px;font-weight:700;line-height:1.3;}
.scard .ss{font-size:10px;color:var(--text-muted);}
.scard.selected .ss{color:var(--text-secondary);}

.setup-footer{
  position:relative;z-index:1;
  padding:14px 16px;
  padding-bottom:max(env(safe-area-inset-bottom),14px);
  flex-shrink:0;
}
.snext{
  width:100%;padding:15px;
  border-radius:16px;
  background:linear-gradient(135deg, #63b3ed, #4299e1);
  color:#fff;font-size:16px;font-weight:700;
  border:none;cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 20px rgba(99,179,237,0.4);
  transition:all 0.2s;letter-spacing:0.3px;
}
.snext{display:none;}

/* ══ HEADER ══ */
.header{
  background:rgba(10,22,40,0.8);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  padding:9px 14px;
  padding-top:max(env(safe-area-inset-top),9px);
  flex-shrink:0;
}
.header-top{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
.app-name{
  color:var(--text-primary);
  font-size:18px;font-weight:700;
  letter-spacing:-0.3px;
}
.app-name span{
  background:linear-gradient(135deg, #63b3ed, #68d391);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* 職種プルダウン */
.job-chip{
  background:var(--glass);
  backdrop-filter:blur(10px);
  border:1px solid var(--glass-border);
  border-radius:20px;padding:6px 12px;
  font-size:12px;color:var(--text-primary);
  cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;gap:5px;
  transition:all 0.18s;
}
.job-chip:active{background:var(--accent-soft);}
.job-chip-icon{font-size:14px;}
.job-chip-arrow{font-size:10px;color:var(--text-muted);transition:transform 0.2s;}
.job-chip.open .job-chip-arrow{transform:rotate(180deg);}

/* プルダウンメニュー */
#job-dropdown{
  display:none;
  position:fixed;
  background:rgba(15,30,60,0.97);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:14px;
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  z-index:500;min-width:180px;overflow:hidden;
}
.job-dropdown-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;font-size:13px;
  cursor:pointer;border:none;
  background:transparent;width:100%;
  text-align:left;font-family:var(--font);
  color:var(--text-primary);
  transition:background 0.15s;
  border-bottom:1px solid var(--border);
}
.job-dropdown-item:last-child{border-bottom:none;}
.job-dropdown-item:active{background:var(--glass);}
.job-dropdown-item.active-job{
  background:var(--bg-active);color:var(--accent);font-weight:700;
}
.job-dropdown-item .dji{font-size:18px;}

/* 言語スイッチャー */
.lang-sw{
  display:flex;gap:6px;overflow-x:auto;
  scrollbar-width:none;padding-bottom:2px;
}
.lang-sw::-webkit-scrollbar{display:none;}
.lbtn{
  flex:none;display:flex;align-items:center;gap:4px;
  padding:5px 11px;border-radius:20px;
  border:1px solid var(--glass-border);
  background:var(--glass);
  color:var(--text-secondary);
  font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--font);
  white-space:nowrap;transition:all 0.18s;
}
.lbtn.active{
  background:var(--accent-soft);
  color:var(--accent);
  border-color:var(--border-active);
}
.lbtn .lf{font-size:15px;}

/* ══ CATEGORIES ══ */
.cats{
  display:flex;
  background:rgba(10,22,40,0.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.cats::-webkit-scrollbar{display:none;}
.cbt{
  flex:none;padding:10px 14px;
  font-size:12px;font-weight:600;
  border:none;background:none;
  color:var(--text-muted);
  cursor:pointer;font-family:var(--font);
  border-bottom:2px solid transparent;
  white-space:nowrap;transition:all 0.18s;
}
.cbt.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ══ PHRASE LIST ══ */
.phrase-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 80px;}

.pcard{
  background:var(--glass);
  backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  border-radius:16px;padding:14px;
  margin-bottom:9px;cursor:pointer;
  transition:all 0.2s;position:relative;
  overflow:hidden;
}
.pcard::before{
  content:'';position:absolute;
  inset:0;border-radius:16px;
  background:linear-gradient(135deg, rgba(99,179,237,0.05) 0%, transparent 60%);
  opacity:0;transition:opacity 0.2s;
}
.pcard:active{transform:scale(0.98);}
.pcard.selected{
  background:var(--bg-active);
  border-color:var(--border-active);
  box-shadow:0 0 20px rgba(99,179,237,0.15);
}
.pcard.selected::before{opacity:1;}

.recent-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;color:var(--accent);
  background:var(--accent-soft);
  border-radius:8px;padding:2px 8px;
  margin-bottom:6px;font-weight:600;
}
.pcard-jp{
  font-size:19px;font-weight:700;
  color:var(--text-primary);line-height:1.35;
}
.pcard-read{
  font-size:11px;color:var(--text-muted);
  margin:2px 0 8px;
}
.pcard-divider{
  height:1px;
  background:linear-gradient(90deg, var(--border), transparent);
  margin-bottom:8px;
}
.pcard-tl{
  font-size:16px;font-weight:600;
  color:var(--accent);line-height:1.35;
}
.pcard.selected .pcard-tl{color:#90cdf4;}
.pcard-btns{display:flex;gap:7px;margin-top:11px;}
.pbtn{
  flex:1;padding:9px 0;border-radius:10px;
  border:none;cursor:pointer;
  font-size:12px;font-weight:700;
  font-family:var(--font);
  display:flex;align-items:center;
  justify-content:center;gap:4px;
  transition:all 0.15s;
}
.pbtn:active{transform:scale(0.95);}
.pbtn-jp{
  background:linear-gradient(135deg, #2b4a7a, #1a3a5c);
  color:var(--text-primary);
  border:1px solid var(--border);
}
.pbtn-tl{
  background:var(--accent-soft);
  color:var(--accent);
  border:1px solid var(--border-active);
}
.pcard.selected .pbtn-tl{background:rgba(99,179,237,0.25);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:0.5;}

/* ══ EMERGENCY ══ */
.emerg-list{flex:1;overflow-y:auto;padding:10px 12px 80px;}
.emerg-top{
  background:rgba(252,129,129,0.1);
  border:1px solid rgba(252,129,129,0.3);
  border-radius:12px;padding:10px 14px;
  margin-bottom:10px;font-size:12px;
  color:var(--danger);font-weight:600;
}
.ecard{
  background:var(--glass);
  backdrop-filter:blur(12px);
  border:1px solid rgba(252,129,129,0.2);
  border-left:3px solid var(--danger);
  border-radius:14px;padding:13px 14px;
  margin-bottom:9px;transition:all 0.15s;
}
.ecard:active{transform:scale(0.98);}
.ebadge{
  display:inline-block;font-size:10px;
  padding:2px 8px;border-radius:8px;
  background:rgba(252,129,129,0.15);
  color:var(--danger);font-weight:700;margin-bottom:5px;
}
.ecard-jp{font-size:17px;font-weight:700;color:var(--text-primary);}
.ecard-tl{font-size:14px;font-weight:600;color:var(--accent);margin-top:5px;}
.ecard-btns{display:flex;gap:8px;margin-top:10px;}
.ebtn{
  flex:1;padding:9px 0;border-radius:10px;
  border:none;cursor:pointer;font-size:12px;
  font-weight:700;font-family:var(--font);
  display:flex;align-items:center;
  justify-content:center;gap:4px;
}
.ebtn-jp{background:rgba(26,58,92,0.8);color:var(--text-primary);border:1px solid var(--border);}
.ebtn-tl{background:var(--accent-soft);color:var(--accent);border:1px solid var(--border-active);}

/* ══ ADD SCREEN ══ */
.add-screen{flex:1;overflow-y:auto;padding:14px 14px 80px;}
.add-sec{
  background:var(--glass);
  backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  border-radius:16px;padding:16px;
  margin-bottom:12px;
}
.add-lbl{
  font-size:11px;font-weight:700;
  color:var(--text-muted);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:1px;
}
.add-inp{
  width:100%;padding:11px 12px;
  border:1px solid var(--glass-border);
  border-radius:10px;font-size:15px;
  font-family:var(--font);color:var(--text-primary);
  background:rgba(255,255,255,0.05);outline:none;
  transition:border-color 0.18s;
}
.add-inp:focus{border-color:var(--border-active);}
.add-inp::placeholder{color:var(--text-muted);}
.add-cat-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.acat{
  padding:6px 13px;border-radius:20px;
  border:1px solid var(--glass-border);
  background:transparent;color:var(--text-secondary);
  font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--font);
  transition:all 0.15s;
}
.acat.selected{
  background:var(--accent-soft);
  color:var(--accent);border-color:var(--border-active);
}
.add-save{
  width:100%;padding:14px;border-radius:12px;
  background:linear-gradient(135deg, #63b3ed, #4299e1);
  color:#fff;border:none;font-size:16px;
  font-weight:700;cursor:pointer;font-family:var(--font);
  margin-top:4px;
  box-shadow:0 4px 20px rgba(99,179,237,0.3);
  transition:all 0.2s;
}
.add-save:active{transform:scale(0.98);}
.add-save:disabled{opacity:0.3;cursor:default;box-shadow:none;}
.tr-status{font-size:12px;margin-top:7px;padding:8px 12px;border-radius:8px;display:none;line-height:1.4;}
.tr-status.loading{display:block;background:rgba(99,179,237,0.1);color:var(--accent);}
.tr-status.success{display:block;background:rgba(104,211,145,0.1);color:var(--success);}
.tr-status.error{display:block;background:rgba(252,129,129,0.1);color:var(--danger);}
.tl-results{margin-top:10px;display:none;}
.tl-results.show{display:block;}
.tl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.tl-flag{font-size:16px;flex-shrink:0;}
.tl-inp{
  flex:1;padding:8px 10px;
  border:1px solid var(--glass-border);
  border-radius:8px;font-size:13px;
  font-family:var(--font);color:var(--text-primary);
  background:rgba(255,255,255,0.05);outline:none;
}
.tl-inp:focus{border-color:var(--border-active);}
.custom-item{
  display:flex;align-items:center;
  justify-content:space-between;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:10px;padding:11px 13px;margin-bottom:7px;
}
.ci-text{font-size:14px;color:var(--text-primary);font-weight:600;}
.ci-tl{font-size:12px;color:var(--text-muted);margin-top:2px;}
.del-btn{
  padding:5px 10px;border-radius:8px;
  border:1px solid rgba(252,129,129,0.3);
  background:rgba(252,129,129,0.1);
  color:var(--danger);font-size:12px;
  cursor:pointer;font-family:var(--font);
}

/* ══ BOTTOM NAV ══ */
.bnav{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%);
  width:100%;max-width:430px;
  display:flex;
  background:rgba(10,22,40,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--glass-border);
  padding-bottom:env(safe-area-inset-bottom);z-index:100;
}
.bb{
  flex:1;padding:10px 4px 8px;
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
  font-size:10px;color:var(--text-muted);
  border:none;background:none;
  cursor:pointer;font-family:var(--font);
  transition:color 0.18s;
}
.bb .bi{font-size:22px;}
.bb.active{color:var(--accent);}

@media(max-height:700px){
  .scard{padding:10px 8px;}
  .scard .si{font-size:22px;}
  .scard .sn{font-size:11px;}
  .setup-tagline{font-size:18px;}
  .setup-logo{font-size:36px;}
}
</style>
</head>
<body>
<div id="app">

<!-- SETUP: 職種のみ -->
<div id="setup">
  <div class="welcome-bg"></div>
  <div class="setup-hero">
    <div class="setup-logo">🏭</div>
    <div class="setup-tagline">現場の声を、<br><span>もっとスムーズに。</span></div>
    <div class="setup-sub">
      外国人スタッフとの<em>コミュニケーション</em>を<br>スムーズにするアプリです<br><br>
      <em>職種をタップ</em>してはじめてください
    </div>
  </div>
  <div class="setup-body">
    <div class="setup-label">Job Category — 職種を選んでください</div>
    <div class="setup-grid" id="setup-body"></div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="app-name">現場<span>会話</span></div>
    <div style="position:relative;">
      <button class="job-chip" id="job-chip" onclick="toggleJobDropdown()">
        <span class="job-chip-icon" id="job-icon"></span>
        <span id="job-name"></span>
        <span class="job-chip-arrow" id="job-chip-arrow">▼</span>
      </button>
    </div>
  </div>
  <div class="lang-sw" id="lang-sw"></div>
</div>
<!-- Job dropdown - outside header to avoid clipping -->
<div id="job-dropdown" style="position:fixed;top:0;right:0;z-index:300;display:none;"></div>

<div class="cats" id="cats"></div>

<div id="sc-main" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
  <div class="phrase-list" id="phrase-list"></div>
</div>
<div id="sc-emerg" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="emerg-list">
    <div class="emerg-top">🚨 タップで音声再生 — オフライン対応</div>
    <div id="emerg-list"></div>
  </div>
</div>
<div id="sc-add" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="add-screen">
    <div class="add-sec">
      <div class="add-lbl">① 日本語フレーズを入力</div>
      <input class="add-inp" id="add-jp" type="text" placeholder="例：休憩してください" oninput="onAddJpInput()">
      <div class="add-lbl" style="margin-top:12px;">② カテゴリー</div>
      <div class="add-cat-row" id="add-cat-row"></div>
      <div class="tr-status" id="tr-status"></div>
      <div class="tl-results" id="tl-results"></div>
    </div>
    <button class="add-save" id="add-save" onclick="savePhrase()" disabled>＋ 全言語に追加する</button>
    <div id="custom-list" style="margin-top:12px;"></div>
  </div>
</div>

<div class="bnav">
  <button class="bb active" id="bn-main" onclick="switchScreen('main')"><span class="bi">💬</span>会話</button>
  <button class="bb" id="bn-emerg" onclick="switchScreen('emerg')"><span class="bi">🚨</span>緊急</button>
  <button class="bb" id="bn-add" onclick="switchScreen('add')"><span class="bi">＋</span>追加</button>
</div>
</div>

<script>

/* ══ DATA ══ */
const JOBS = [
  {id:'manufacturing', icon:'🏭', name:'製造業',     sub:'工場・加工'},
  {id:'hospitality',   icon:'🏨', name:'サービス業', sub:'宿泊・飲食'},
  {id:'retail',        icon:'🛒', name:'卸売・小売', sub:'コンビニ・スーパー'},
  {id:'construction',  icon:'🏗️', name:'建設業',     sub:'現場・土木'},
  {id:'care',          icon:'🏥', name:'医療・福祉', sub:'介護・病院'},
  {id:'agriculture',   icon:'🌾', name:'農業・漁業', sub:'農場・漁港'},
];

const ALL_LANGS = {

/* ══ 音声再生（修正済み）══ */
// iPhone Safari音声再生対応
function speak(text, lang) {
  if (!window.speechSynthesis) { alert('音声合成非対応のブラウザです'); return; }
  
  // 既存の再生を止める
  window.speechSynthesis.cancel();
  
  // iPhoneはユーザー操作の直後でないと再生できない
  // また voices が非同期で読み込まれるため待機が必要
  const doSpeak = () => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'ja-JP';
    u.rate = 0.85;
    u.volume = 1.0;
    u.pitch = 1.0;
    
    // 言語に合うvoiceを探す
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
      const langCode = (lang || 'ja-JP').split('-')[0];
      const matched = voices.find(v => v.lang.startsWith(langCode));
      if (matched) u.voice = matched;
    }
    
    window.speechSynthesis.speak(u);
  };
  
  // voicesが読み込まれているか確認
  if (window.speechSynthesis.getVoices().length > 0) {
    setTimeout(doSpeak, 50);
  } else {
    // voices未読み込みの場合はイベント待ち
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      setTimeout(doSpeak, 50);
    };
    // フォールバック: 1秒後に強制実行
    setTimeout(doSpeak, 500);
  }
}

function speakById(id, which) {
  const p = [...PHRASES, ...customPhrases].find(x => x.id === id);
  if (!p) return;
  const text = which === 'jp' ? p.jp : T(p);
  const lang = which === 'jp' ? 'ja-JP' : BCP();
  speak(text, lang);
}

function jobMatch(p) {
  return p.jobs === 'all' || (Array.isArray(p.jobs) && p.jobs.includes(selectedJob));
}

  document.getElementById('lang-sw').innerHTML = allLangCodes.map(code => {

    if (!L) return '';
    return `<button class="lbtn${code===currentLang?' active':''}" onclick="switchLang('${code}')">
      <span class="lf">${L.flag}</span>${L.name}
    </button>`;
  }).join('');

function switchLang(code) {
  currentLang = code;
  localStorage.setItem('genba-current', code);
  // 直近使用順を更新
  recentLangs = [code, ...recentLangs.filter(c => c !== code)].slice(0, 9);
  localStorage.setItem('genba-recent-langs', JSON.stringify(recentLangs));
  renderLangSwitcher();
  renderPhrases();
  renderEmerg();
}

function getActiveCats() {
  const all = [...PHRASES, ...customPhrases].filter(jobMatch);
  const used = new Set(all.map(p => p.cat));
  return CAT_DEFS.filter(c => c.id === 'all' || used.has(c.id));
}

function renderCats() {
  const active = getActiveCats();
  if (!active.find(c => c.id === cat)) cat = 'all';
  document.getElementById('cats').innerHTML = active.map(c =>
    `<button class="cbt${c.id===cat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function setCat(id) { cat = id; selectedCard = null; renderCats(); renderPhrases(); }

/* ══ PHRASES：直近使用順で上に表示 ══ */
function renderPhrases() {
  let list = [...PHRASES, ...customPhrases].filter(p =>
    jobMatch(p) && (cat === 'all' || p.cat === cat)
  );

  // 直近使用フレーズを上に並べる
  const recentSet = new Set(recentPhraseIds);
  const recentList = recentPhraseIds
    .map(id => list.find(p => p.id === id))
    .filter(Boolean);
  const otherList = list.filter(p => !recentSet.has(p.id));
  list = [...recentList, ...otherList];

  if (!list.length) {
    document.getElementById('phrase-list').innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div>フレーズがありません</div></div>`;
    return;
  }

  document.getElementById('phrase-list').innerHTML = list.map(p => {
    const tlTxt = T(p);
    const isRecent = recentSet.has(p.id);
    return `<div class="pcard${selectedCard===p.id?' selected':''}" id="pc-${p.id}" onclick="selCard(${p.id})">
      ${isRecent ? '<div style="font-size:10px;color:#94a3b8;margin-bottom:4px;">🕐 直近使用</div>' : ''}
      <div class="pcard-jp">${p.jp}</div>
      <div class="pcard-read">${p.read||''}</div>
      <div class="pcard-divider"></div>
      <div class="pcard-tl">${tlTxt}</div>
      <div class="pcard-btns">
        <button class="pbtn pbtn-jp" onclick="event.stopPropagation();speak('${esc(p.jp)}','ja-JP')">🔊 日本語</button>
        <button class="pbtn pbtn-tl" onclick="event.stopPropagation();speak('${esc(tlTxt)}','${BCP()}')">🔊 ${ALL_LANGS[currentLang]?.name||''}</button>
      </div>
    </div>`;
  }).join('');
}

function selCard(id) {
  const p = [...PHRASES, ...customPhrases].find(x => x.id === id);
  if (!p) return;

  // 直近使用リストを更新
  recentPhraseIds = [id, ...recentPhraseIds.filter(x => x !== id)].slice(0, 20);
  localStorage.setItem('genba-recent-phrases', JSON.stringify(recentPhraseIds));

  // ハイライトのみ（音声は各ボタンから個別に再生）
  if (selectedCard === id) {
    selectedCard = null;
    document.getElementById('pc-'+id)?.classList.remove('selected');
    return;
  }
  if (selectedCard) document.getElementById('pc-'+selectedCard)?.classList.remove('selected');
  selectedCard = id;
  document.getElementById('pc-'+id)?.classList.add('selected');
}

async function onAddJpInput() {
  const jp = document.getElementById('add-jp').value.trim();
  if (!jp) {
    document.getElementById('tl-results').classList.remove('show');
    document.getElementById('add-save').disabled = true;
    allTlResults = {};
    return;
  }

  // 自動翻訳開始
  const status = document.getElementById('tr-status');
  status.className = 'tr-status loading';
  status.textContent = '🌐 全言語に自動翻訳中...';
  document.getElementById('add-save').disabled = true;
  allTlResults = {};

  const langMap = {en:'en-US',vi:'vi-VN',id:'id-ID',zh:'zh-CN',tl:'tl-PH',my:'my-MM',th:'th-TH',ne:'ne-NP',km:'km-KH'};
  const langCodes = Object.keys(ALL_LANGS);

  try {
    // 全言語を並列翻訳
    const results = await Promise.allSettled(
      langCodes.map(code =>
        fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(jp)}&langpair=ja|${langMap[code]||code}`)
          .then(r => r.json())
          .then(d => ({code, text: d.responseData?.translatedText || ''}))
      )
    );

    results.forEach(r => {
      if (r.status === 'fulfilled' && r.value.text) {
        allTlResults[r.value.code] = r.value.text;
      }
    });

    // 翻訳結果を表示（修正可能）
    const tlDiv = document.getElementById('tl-results');
    tlDiv.innerHTML = langCodes.map(code => {
      const L = ALL_LANGS[code];
      return `<div class="tl-row">
        <span class="tl-flag">${L.flag}</span>
        <input class="tl-inp" id="tl-${code}" type="text" 
          value="${(allTlResults[code]||'').replace(/"/g,'&quot;')}" 
          placeholder="${L.name}" 
          oninput="allTlResults['${code}']=this.value">
      </div>`;
    }).join('');
    tlDiv.classList.add('show');

    status.className = 'tr-status success';
    status.textContent = '✓ 翻訳完了 — 修正してから追加できます';
    document.getElementById('add-save').disabled = false;

  } catch(e) {
    status.className = 'tr-status error';
    status.textContent = '⚠ 翻訳エラー。通信を確認してください。';
  }
}

function savePhrase() {
  const jp = document.getElementById('add-jp').value.trim();
  if (!jp) return;

  // 全言語の翻訳結果を取得（入力欄の値を優先）
  const tObj = {};
  Object.keys(ALL_LANGS).forEach(code => {
    const inp = document.getElementById('tl-'+code);
    tObj[code] = inp ? inp.value.trim() : (allTlResults[code] || '');
  });

  const p = {id: nextId++, jobs: 'all', cat: addCat, jp, read: '', t: tObj, custom: true};
  customPhrases.push(p);
  localStorage.setItem('genba-custom', JSON.stringify(customPhrases));
  localStorage.setItem('genba-next-id', String(nextId));

  // リセット
  document.getElementById('add-jp').value = '';
  document.getElementById('tl-results').classList.remove('show');
  document.getElementById('tr-status').className = 'tr-status';
  document.getElementById('add-save').disabled = true;
  allTlResults = {};

  renderCustomList();
  renderPhrases();
  renderCats();
  alert('追加しました！');
}

function deleteCustom(id) {
  customPhrases = customPhrases.filter(p => p.id !== id);
  localStorage.setItem('genba-custom', JSON.stringify(customPhrases));
  renderCustomList();
  renderPhrases();
  renderCats();
}

function renderCustomList() {
  const w = document.getElementById('custom-list');
  if (!customPhrases.length) { w.innerHTML = ''; return; }
  w.innerHTML = `<div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">追加済みフレーズ</div>` +
    customPhrases.map(p => `
    <div class="custom-item">
      <div>
        <div class="ci-text">${p.jp}</div>
        <div class="ci-tl">${p.t?p.t[currentLang]||p.t.en||'':p.tl||''}</div>
      </div>
      <button class="del-btn" onclick="deleteCustom(${p.id})">削除</button>
    </div>`).join('');
}

/* ══ SCREEN ══ */
function switchScreen(n) {
  ['main','emerg','add'].forEach(s => {
    document.getElementById('sc-'+s).style.display = s===n ? 'flex' : 'none';
    document.getElementById('bn-'+s).classList.toggle('active', s===n);
  });
  if (n === 'add') { renderAddCatRow(); renderCustomList(); }
}

/* ══ JOB DROPDOWN ══ */
let jobDropdownOpen = false;

function toggleJobDropdown() {
  jobDropdownOpen = !jobDropdownOpen;
  const dd = document.getElementById('job-dropdown');
  const chip = document.getElementById('job-chip');
  if (jobDropdownOpen) {
    dd.innerHTML = JOBS.map(j => `
      <button class="job-dropdown-item${j.id===selectedJob?' active-job':''}" onclick="changeJob('${j.id}')">
        <span class="dji">${j.icon}</span>
        <div>
          <div style="font-weight:700;font-size:13px;">${j.name}</div>
          <div style="font-size:10px;color:var(--text-muted);">${j.sub}</div>
        </div>
        ${j.id===selectedJob?'<span style="margin-left:auto;color:var(--accent);font-size:14px;">✓</span>':''}
      </button>`).join('');
    // Position below job-chip button
    const rect = chip.getBoundingClientRect();
    dd.style.top = (rect.bottom + 6) + 'px';
    dd.style.right = (window.innerWidth - rect.right) + 'px';
    dd.style.display = 'block';
    chip.classList.add('open');
  } else {
    dd.style.display = 'none';
    chip.classList.remove('open');
  }
}

function changeJob(id) {
  selectedJob = id;
  localStorage.setItem('genba-job', id);
  jobDropdownOpen = false;
  document.getElementById('job-dropdown').style.display = 'none';
  document.getElementById('job-chip').classList.remove('open');
  cat = 'all';
  selectedCard = null;
  renderAll();
}

function closeJobSheet() {
  jobDropdownOpen = false;
  const dd = document.getElementById('job-dropdown');
  if (dd) dd.style.display = 'none';
  document.getElementById('job-chip')?.classList.remove('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('#job-chip') && !e.target.closest('#job-dropdown') && jobDropdownOpen) {
    closeJobSheet();
  }
});

/* ══ INIT ══ */
function renderAll() {
  renderHeader();
  renderCats();
  renderPhrases();
  renderEmerg();
}

if (selectedJob) {
  document.getElementById('setup').classList.add('hidden');
  renderAll();
} else {
  setupJob = '';
  initSetup();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
