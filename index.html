<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場会話">
<link rel="manifest" href="manifest.json">
<title>現場会話</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#1a3a5c;font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;}
#app{max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:#f2f4f7;overflow:hidden;}

/* SETUP - 職種のみ */
#setup{position:fixed;inset:0;z-index:500;background:#1a3a5c;display:flex;flex-direction:column;overflow:hidden;}
#setup.hidden{display:none;}
.setup-header{padding:max(env(safe-area-inset-top),20px) 20px 14px;flex-shrink:0;}
.setup-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:5px;}
.setup-sub{color:rgba(255,255,255,0.5);font-size:13px;line-height:1.5;}
.setup-body{flex:1;overflow-y:auto;padding:8px 16px 8px;-webkit-overflow-scrolling:touch;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.scard{padding:14px 8px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;font-family:inherit;text-align:center;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.scard:active{transform:scale(0.96);}
.scard.selected{border-color:#7ec8f0;background:rgba(126,200,240,0.22);}
.scard .si{font-size:28px;}
.scard .sn{font-size:13px;font-weight:700;line-height:1.3;}
.scard .ss{font-size:10px;opacity:0.55;}
.setup-footer{padding:12px 16px;padding-bottom:max(env(safe-area-inset-bottom),12px);flex-shrink:0;}
.snext{width:100%;padding:14px;border-radius:14px;background:#fff;color:#1a3a5c;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;}
.snext:disabled{opacity:0.3;cursor:default;}

/* HEADER */
.header{background:#1a3a5c;padding:9px 14px;padding-top:max(env(safe-area-inset-top),9px);flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.app-name{color:#fff;font-size:17px;font-weight:700;}
/* 職種名タップで変更 */
.job-chip{background:rgba(255,255,255,0.14);border-radius:20px;padding:5px 12px;font-size:12px;color:#fff;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background 0.18s;}
.job-chip:active{background:rgba(255,255,255,0.25);}
.job-chip-icon{font-size:14px;}
/* 言語スイッチャー - 直近使用順 */
.lang-sw{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.lang-sw::-webkit-scrollbar{display:none;}
.lbtn{flex:none;display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.18s;}
.lbtn.active{background:#fff;color:#1a3a5c;border-color:#fff;}
.lbtn .lf{font-size:15px;}

/* CATS */
.cats{display:flex;background:#fff;border-bottom:1px solid #e0e6ef;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cbt{flex:none;padding:10px 14px;font-size:12px;font-weight:600;border:none;background:none;color:#94a3b8;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.18s;}
.cbt.active{color:#1a3a5c;border-bottom-color:#1a3a5c;}

/* PHRASE LIST */
.phrase-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 80px;}
.pcard{background:#fff;border:1.5px solid #e0e6ef;border-radius:14px;padding:13px;margin-bottom:8px;cursor:pointer;transition:all 0.18s;}
.pcard:active{transform:scale(0.98);}
.pcard.selected{background:#eaf4ff;border-color:#1a3a5c;box-shadow:0 2px 12px rgba(26,58,92,0.12);}
.pcard-jp{font-size:18px;font-weight:700;color:#0d1f35;line-height:1.35;}
.pcard-read{font-size:11px;color:#b0bec5;margin:2px 0 7px;}
.pcard-divider{height:1px;background:#f0f4f8;margin-bottom:7px;}
.pcard-tl{font-size:16px;font-weight:600;color:#1a3a5c;line-height:1.35;}
.pcard.selected .pcard-tl{color:#0a2d52;}
.pcard-btns{display:flex;gap:7px;margin-top:10px;}
.pbtn{flex:1;padding:9px 0;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform 0.12s;}
.pbtn:active{transform:scale(0.95);}
.pbtn-jp{background:#1a3a5c;color:#fff;}
.pbtn-tl{background:#ddeeff;color:#1a3a5c;}
.pcard.selected .pbtn-tl{background:#b8d8f8;}
.empty-state{text-align:center;padding:40px 20px;color:#94a3b8;}
.empty-icon{font-size:36px;margin-bottom:8px;}

/* EMERGENCY */
.emerg-list{flex:1;overflow-y:auto;padding:10px 12px 80px;}
.emerg-top{background:#fff3f3;border:1px solid #ffbaba;border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#c0392b;font-weight:600;}
.ecard{background:#fff;border:1px solid #f5a0a0;border-left:4px solid #e74c3c;border-radius:14px;padding:13px 14px;margin-bottom:9px;}
.ecard:active{transform:scale(0.98);}
.ebadge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:#fde8e8;color:#c0392b;font-weight:700;margin-bottom:5px;}
.ecard-jp{font-size:17px;font-weight:700;color:#0d1f35;}
.ecard-tl{font-size:14px;font-weight:600;color:#1a3a5c;margin-top:5px;}
.ecard-btns{display:flex;gap:8px;margin-top:10px;}
.ebtn{flex:1;padding:9px 0;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;}
.ebtn-jp{background:#1a3a5c;color:#fff;}
.ebtn-tl{background:#ddeeff;color:#1a3a5c;}

/* ADD - シンプル化 */
.add-screen{flex:1;overflow-y:auto;padding:14px 14px 80px;}
.add-sec{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #e0e6ef;}
.add-lbl{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
.add-inp{width:100%;padding:11px 12px;border:1.5px solid #e0e6ef;border-radius:10px;font-size:15px;font-family:inherit;color:#0d1f35;background:#f8fafc;outline:none;transition:border-color 0.18s;}
.add-inp:focus{border-color:#1a3a5c;}
.add-inp::placeholder{color:#b0bec5;}
.add-cat-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.acat{padding:6px 13px;border-radius:20px;border:1.5px solid #e0e6ef;background:#fff;color:#1a3a5c;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.acat.selected{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.add-save{width:100%;padding:14px;border-radius:12px;background:#1a3a5c;color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.add-save:active{transform:scale(0.98);}
.add-save:disabled{opacity:0.4;cursor:default;}
.tr-status{font-size:12px;margin-top:7px;padding:8px 12px;border-radius:8px;display:none;line-height:1.4;}
.tr-status.loading{display:block;background:#f0f4ff;color:#1a3a5c;}
.tr-status.success{display:block;background:#e8f8ee;color:#0a6644;}
.tr-status.error{display:block;background:#fff0f0;color:#c0392b;}
.tl-results{margin-top:10px;display:none;}
.tl-results.show{display:block;}
.tl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.tl-flag{font-size:16px;flex-shrink:0;}
.tl-inp{flex:1;padding:8px 10px;border:1.5px solid #e0e6ef;border-radius:8px;font-size:13px;font-family:inherit;color:#0d1f35;background:#f8fafc;outline:none;}
.tl-inp:focus{border-color:#1a3a5c;}
.custom-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0e6ef;border-radius:10px;padding:11px 13px;margin-bottom:7px;}
.ci-text{font-size:14px;color:#0d1f35;font-weight:600;}
.ci-tl{font-size:12px;color:#94a3b8;margin-top:2px;}
.del-btn{padding:5px 10px;border-radius:8px;border:1px solid #fde8e8;background:#fff5f5;color:#e74c3c;font-size:12px;cursor:pointer;font-family:inherit;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:#fff;border-top:1px solid #e0e6ef;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.bb{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#94a3b8;border:none;background:none;cursor:pointer;font-family:inherit;}
.bb .bi{font-size:20px;}
.bb.active{color:#1a3a5c;}

/* JOB CHANGE SHEET */
.sheet-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.4);}
.sheet-overlay.open{display:block;}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-radius:20px 20px 0 0;padding:14px 0;padding-bottom:max(env(safe-area-inset-bottom),14px);z-index:401;}
.sheet-handle{width:36px;height:4px;background:#d0d8e4;border-radius:2px;margin:0 auto 14px;}
.sheet-title{font-size:14px;font-weight:700;color:#1a3a5c;padding:0 18px 12px;}
.sheet-item{display:flex;align-items:center;gap:12px;padding:13px 18px;font-size:14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;color:#0d1f35;transition:background 0.15s;}
.sheet-item:active{background:#f4f6f9;}
.sheet-item.active-job{font-weight:700;background:#eaf4ff;}
.sheet-item .sji{font-size:22px;}

@media(max-height:700px){.scard{padding:10px 8px;}.scard .si{font-size:22px;}.scard .sn{font-size:11px;}.setup-title{font-size:19px;}}
</style>
</head>
<body>
<div id="app">

<!-- SETUP: 職種のみ -->
<div id="setup">
  <div class="setup-header">
    <div class="setup-title">職種を選んでください</div>
    <div class="setup-sub">Job Category — あなたの現場はどれですか？</div>
  </div>
  <div class="setup-body" id="setup-body"></div>
  <div class="setup-footer">
    <button class="snext" id="snext" onclick="finishSetup()" disabled>はじめる →</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="app-name">現場会話</div>
    <!-- 職種名タップで変更 -->
    <button class="job-chip" id="job-chip" onclick="openJobSheet()">
      <span class="job-chip-icon" id="job-icon"></span>
      <span id="job-name"></span> ✎
    </button>
  </div>
  <!-- 言語スイッチャー：直近使用順 -->
  <div class="lang-sw" id="lang-sw"></div>
</div>

<div class="cats" id="cats"></div>

<div id="sc-main" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
  <div class="phrase-list" id="phrase-list"></div>
</div>
<div id="sc-emerg" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="emerg-list">
    <div class="emerg-top">🚨 タップで音声再生 — オフライン対応</div>
    <div id="emerg-list"></div>
  </div>
</div>
<div id="sc-add" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="add-screen">
    <div class="add-sec">
      <div class="add-lbl">① 日本語フレーズを入力</div>
      <input class="add-inp" id="add-jp" type="text" placeholder="例：休憩してください" oninput="onAddJpInput()">
      <div class="add-lbl" style="margin-top:12px;">② カテゴリー</div>
      <div class="add-cat-row" id="add-cat-row"></div>
      <div class="tr-status" id="tr-status"></div>
      <div class="tl-results" id="tl-results"></div>
    </div>
    <button class="add-save" id="add-save" onclick="savePhrase()" disabled>＋ 全言語に追加する</button>
    <div id="custom-list" style="margin-top:12px;"></div>
  </div>
</div>

<div class="bnav">
  <button class="bb active" id="bn-main" onclick="switchScreen('main')"><span class="bi">💬</span>会話</button>
  <button class="bb" id="bn-emerg" onclick="switchScreen('emerg')"><span class="bi">🚨</span>緊急</button>
  <button class="bb" id="bn-add" onclick="switchScreen('add')"><span class="bi">＋</span>追加</button>
</div>
</div>

<!-- 職種変更シート -->
<div class="sheet-overlay" id="job-sheet-overlay" onclick="closeJobSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title">職種を変更 / Change Job</div>
    <div id="job-sheet-list"></div>
  </div>
</div>

const EMERG=[
  {badge:'危険',jp:'危ない！止まれ！',  t:{en:'Danger! Stop!',vi:'Nguy hiểm! Dừng!',id:'Bahaya! Berhenti!',zh:'危险！停！',tl:'Panganib! Hinto!',my:'အန္တရာယ်! ရပ်!',th:'อันตราย! หยุด!',ne:'खतरा! रोक!',km:'គ្រោះថ្នាក់! ឈប់!'}},
  {badge:'緊急',jp:'助けてください！',  t:{en:'Help me!',vi:'Giúp tôi!',id:'Tolong!',zh:'救命！',tl:'Saklolo!',my:'ကူညီပါ!',th:'ช่วยด้วย!',ne:'मद्दत!',km:'ជួយខ្ញុំ!'}},
  {badge:'怪我',jp:'怪我をしました',    t:{en:'I am injured',vi:'Tôi bị thương',id:'Saya terluka',zh:'我受伤了',tl:'Nasugatan ako',my:'ဒဏ်ရာရသည်',th:'ฉันบาดเจ็บ',ne:'म चोटिएको छु',km:'ខ្ញុំរបួស'}},
  {badge:'火災',jp:'火事です！',        t:{en:'Fire!',vi:'Cháy!',id:'Kebakaran!',zh:'着火了！',tl:'Sunog!',my:'မီးလောင်!',th:'ไฟไหม้!',ne:'आगो!',km:'ភ្លើងឆេះ!'}},
  {badge:'',    jp:'気分が悪いです',    t:{en:"I don't feel well",vi:'Tôi không khỏe',id:'Saya tidak enak badan',zh:'我不舒服',tl:'Hindi ako maayos',my:'မကောင်းပါ',th:'ไม่สบาย',ne:'मलाई राम्रो लागेन',km:'ខ្ញុំមិនស្រួល'}},
  {badge:'',    jp:'電話してください',  t:{en:'Please call someone',vi:'Gọi điện đi',id:'Tolong telepon',zh:'请打电话',tl:'Tumawag',my:'ဖုန်းခေါ်ပေးပါ',th:'โทรหาคน',ne:'फोन गर्नुस्',km:'ជួយទូរស័ព្ទ'}},
];

/* ══ STATE ══ */
let selectedJob   = localStorage.getItem('genba-job') || '';
// 直近使用順の言語リスト
let recentLangs   = JSON.parse(localStorage.getItem('genba-recent-langs') || '["vi","id","en"]');
let currentLang   = localStorage.getItem('genba-current') || recentLangs[0] || 'vi';
let cat           = 'all';
let selectedCard  = null;
let addCat        = 'work';
let customPhrases = JSON.parse(localStorage.getItem('genba-custom') || '[]');
let nextId        = parseInt(localStorage.getItem('genba-next-id') || '1000');
// 直近使用フレーズのIDリスト（最大20件）
let recentPhraseIds = JSON.parse(localStorage.getItem('genba-recent-phrases') || '[]');
// 職種選択用
let setupJob = '';
// 全言語の翻訳結果
let allTlResults = {};

/* ══ SETUP ══ */
function initSetup() {
  document.getElementById('setup-body').innerHTML = `
    <div class="setup-grid">
      ${JOBS.map(j => `
        <button class="scard${setupJob===j.id?' selected':''}" onclick="selJob('${j.id}',this)">
          <span class="si">${j.icon}</span>
          <span class="sn">${j.name}</span>
          <span class="ss">${j.sub}</span>
        </button>`).join('')}
    </div>`;
}

function selJob(id, el) {
  setupJob = id;
  document.querySelectorAll('.scard').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('snext').disabled = false;
}

function finishSetup() {
  if (!setupJob) return;
  selectedJob = setupJob;
  localStorage.setItem('genba-job', selectedJob);
  document.getElementById('setup').classList.add('hidden');
  renderAll();
}

/* ══ JOB SHEET ══ */
function openJobSheet() {
  document.getElementById('job-sheet-list').innerHTML = JOBS.map(j => `
    <button class="sheet-item${j.id===selectedJob?' active-job':''}" onclick="changeJob('${j.id}')">
      <span class="sji">${j.icon}</span>
      <div>
        <div style="font-weight:600">${j.name}</div>
        <div style="font-size:11px;color:#94a3b8">${j.sub}</div>
      </div>
      ${j.id===selectedJob?'<span style="margin-left:auto;color:#1a3a5c">✓</span>':''}
    </button>`).join('');
  document.getElementById('job-sheet-overlay').classList.add('open');
}

function changeJob(id) {
  selectedJob = id;
  localStorage.setItem('genba-job', id);
  closeJobSheet();
  cat = 'all';
  selectedCard = null;
  renderAll();
}

function closeJobSheet() {
  document.getElementById('job-sheet-overlay').classList.remove('open');
}

/* ══ HELPERS ══ */
function T(p) { return p.t ? (p.t[currentLang] || p.t.en || '') : (p.tl || ''); }
function BCP() { return ALL_LANGS[currentLang]?.bcp || 'en-US'; }
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

/* ══ 音声再生（修正済み）══ */
function speak(text, lang) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'ja-JP';
    u.rate = 0.85;
    u.volume = 1;
    speechSynthesis.speak(u);
  }, 100);
}

function jobMatch(p) {
  return p.jobs === 'all' || (Array.isArray(p.jobs) && p.jobs.includes(selectedJob));
}

/* ══ HEADER ══ */
function renderHeader() {
  const j = JOBS.find(x => x.id === selectedJob);
  document.getElementById('job-icon').textContent = j?.icon || '';
  document.getElementById('job-name').textContent = j?.name || '';
  renderLangSwitcher();
}

/* ══ 言語スイッチャー：直近使用順 ══ */
function renderLangSwitcher() {
  // recentLangsの順番で表示（全9言語）
  const allLangCodes = [...recentLangs, ...Object.keys(ALL_LANGS).filter(c => !recentLangs.includes(c))];
  document.getElementById('lang-sw').innerHTML = allLangCodes.map(code => {
    const L = ALL_LANGS[code];
    if (!L) return '';
    return `<button class="lbtn${code===currentLang?' active':''}" onclick="switchLang('${code}')">
      <span class="lf">${L.flag}</span>${L.name}
    </button>`;
  }).join('');
}

function switchLang(code) {
  currentLang = code;
  localStorage.setItem('genba-current', code);
  // 直近使用順を更新
  recentLangs = [code, ...recentLangs.filter(c => c !== code)].slice(0, 9);
  localStorage.setItem('genba-recent-langs', JSON.stringify(recentLangs));
  renderLangSwitcher();
  renderPhrases();
  renderEmerg();
}

/* ══ CATEGORIES ══ */
function getActiveCats() {
  const all = [...PHRASES, ...customPhrases].filter(jobMatch);
  const used = new Set(all.map(p => p.cat));
  return CAT_DEFS.filter(c => c.id === 'all' || used.has(c.id));
}

function renderCats() {
  const active = getActiveCats();
  if (!active.find(c => c.id === cat)) cat = 'all';
  document.getElementById('cats').innerHTML = active.map(c =>
    `<button class="cbt${c.id===cat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function setCat(id) { cat = id; selectedCard = null; renderCats(); renderPhrases(); }

/* ══ PHRASES：直近使用順で上に表示 ══ */
function renderPhrases() {
  let list = [...PHRASES, ...customPhrases].filter(p =>
    jobMatch(p) && (cat === 'all' || p.cat === cat)
  );

  // 直近使用フレーズを上に並べる
  const recentSet = new Set(recentPhraseIds);
  const recentList = recentPhraseIds
    .map(id => list.find(p => p.id === id))
    .filter(Boolean);
  const otherList = list.filter(p => !recentSet.has(p.id));
  list = [...recentList, ...otherList];

  if (!list.length) {
    document.getElementById('phrase-list').innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div>フレーズがありません</div></div>`;
    return;
  }

  document.getElementById('phrase-list').innerHTML = list.map(p => {
    const tlTxt = T(p);
    const isRecent = recentSet.has(p.id);
    return `<div class="pcard${selectedCard===p.id?' selected':''}" id="pc-${p.id}" onclick="selCard(${p.id})">
      ${isRecent ? '<div style="font-size:10px;color:#94a3b8;margin-bottom:4px;">🕐 直近使用</div>' : ''}
      <div class="pcard-jp">${p.jp}</div>
      <div class="pcard-read">${p.read||''}</div>
      <div class="pcard-divider"></div>
      <div class="pcard-tl">${tlTxt}</div>
      <div class="pcard-btns">
        <button class="pbtn pbtn-jp" onclick="event.stopPropagation();speak('${esc(p.jp)}','ja-JP')">🔊 日本語</button>
        <button class="pbtn pbtn-tl" onclick="event.stopPropagation();speak('${esc(tlTxt)}','${BCP()}')">🔊 ${ALL_LANGS[currentLang]?.name||''}</button>
      </div>
    </div>`;
  }).join('');
}

function selCard(id) {
  const p = [...PHRASES, ...customPhrases].find(x => x.id === id);
  if (!p) return;

  // 直近使用リストを更新
  recentPhraseIds = [id, ...recentPhraseIds.filter(x => x !== id)].slice(0, 20);
  localStorage.setItem('genba-recent-phrases', JSON.stringify(recentPhraseIds));

  if (selectedCard === id) {
    selectedCard = null;
    document.getElementById('pc-'+id)?.classList.remove('selected');
    return;
  }
  if (selectedCard) document.getElementById('pc-'+selectedCard)?.classList.remove('selected');
  selectedCard = id;
  document.getElementById('pc-'+id)?.classList.add('selected');

  const tlTxt = T(p);
  // 日本語→外国語の順で再生
  speechSynthesis.cancel();
  setTimeout(() => {
    const ujp = new SpeechSynthesisUtterance(p.jp);
    ujp.lang = 'ja-JP'; ujp.rate = 0.85; ujp.volume = 1;
    const utl = new SpeechSynthesisUtterance(tlTxt);
    utl.lang = BCP(); utl.rate = 0.85; utl.volume = 1;
    ujp.onend = () => setTimeout(() => speechSynthesis.speak(utl), 400);
    speechSynthesis.speak(ujp);
  }, 100);
}

/* ══ EMERGENCY ══ */
function renderEmerg() {
  document.getElementById('emerg-list').innerHTML = EMERG.map(e => {
    const tl = e.t[currentLang] || e.t.en;
    return `<div class="ecard">
      ${e.badge ? `<div class="ebadge">${e.badge}</div>` : ''}
      <div class="ecard-jp">${e.jp}</div>
      <div class="ecard-tl">${tl}</div>
      <div class="ecard-btns">
        <button class="ebtn ebtn-jp" onclick="speak('${esc(e.jp)}','ja-JP')">🔊 日本語</button>
        <button class="ebtn ebtn-tl" onclick="speak('${esc(tl)}','${BCP()}')">🔊 ${ALL_LANGS[currentLang]?.name||''}</button>
      </div>
    </div>`;
  }).join('');
}

/* ══ ADD：シンプル化 - 日本語入力→全言語自動翻訳 ══ */
function renderAddCatRow() {
  const activeCatIds = new Set(getActiveCats().map(c => c.id));
  document.getElementById('add-cat-row').innerHTML = CAT_DEFS
    .filter(c => c.id !== 'all' && activeCatIds.has(c.id))
    .map(c => `<button class="acat${addCat===c.id?' selected':''}" onclick="setAddCat('${c.id}')">${c.label}</button>`).join('');
}

function setAddCat(id) { addCat = id; renderAddCatRow(); }

async function onAddJpInput() {
  const jp = document.getElementById('add-jp').value.trim();
  if (!jp) {
    document.getElementById('tl-results').classList.remove('show');
    document.getElementById('add-save').disabled = true;
    allTlResults = {};
    return;
  }

  // 自動翻訳開始
  const status = document.getElementById('tr-status');
  status.className = 'tr-status loading';
  status.textContent = '🌐 全言語に自動翻訳中...';
  document.getElementById('add-save').disabled = true;
  allTlResults = {};

  const langMap = {en:'en-US',vi:'vi-VN',id:'id-ID',zh:'zh-CN',tl:'tl-PH',my:'my-MM',th:'th-TH',ne:'ne-NP',km:'km-KH'};
  const langCodes = Object.keys(ALL_LANGS);

  try {
    // 全言語を並列翻訳
    const results = await Promise.allSettled(
      langCodes.map(code =>
        fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(jp)}&langpair=ja|${langMap[code]||code}`)
          .then(r => r.json())
          .then(d => ({code, text: d.responseData?.translatedText || ''}))
      )
    );

    results.forEach(r => {
      if (r.status === 'fulfilled' && r.value.text) {
        allTlResults[r.value.code] = r.value.text;
      }
    });

    // 翻訳結果を表示（修正可能）
    const tlDiv = document.getElementById('tl-results');
    tlDiv.innerHTML = langCodes.map(code => {
      const L = ALL_LANGS[code];
      return `<div class="tl-row">
        <span class="tl-flag">${L.flag}</span>
        <input class="tl-inp" id="tl-${code}" type="text" 
          value="${(allTlResults[code]||'').replace(/"/g,'&quot;')}" 
          placeholder="${L.name}" 
          oninput="allTlResults['${code}']=this.value">
      </div>`;
    }).join('');
    tlDiv.classList.add('show');

    status.className = 'tr-status success';
    status.textContent = '✓ 翻訳完了 — 修正してから追加できます';
    document.getElementById('add-save').disabled = false;

  } catch(e) {
    status.className = 'tr-status error';
    status.textContent = '⚠ 翻訳エラー。通信を確認してください。';
  }
}

function savePhrase() {
  const jp = document.getElementById('add-jp').value.trim();
  if (!jp) return;

  // 全言語の翻訳結果を取得（入力欄の値を優先）
  const tObj = {};
  Object.keys(ALL_LANGS).forEach(code => {
    const inp = document.getElementById('tl-'+code);
    tObj[code] = inp ? inp.value.trim() : (allTlResults[code] || '');
  });

  const p = {id: nextId++, jobs: 'all', cat: addCat, jp, read: '', t: tObj, custom: true};
  customPhrases.push(p);
  localStorage.setItem('genba-custom', JSON.stringify(customPhrases));
  localStorage.setItem('genba-next-id', String(nextId));

  // リセット
  document.getElementById('add-jp').value = '';
  document.getElementById('tl-results').classList.remove('show');
  document.getElementById('tr-status').className = 'tr-status';
  document.getElementById('add-save').disabled = true;
  allTlResults = {};

  renderCustomList();
  renderPhrases();
  renderCats();
  alert('追加しました！');
}

function deleteCustom(id) {
  customPhrases = customPhrases.filter(p => p.id !== id);
  localStorage.setItem('genba-custom', JSON.stringify(customPhrases));
  renderCustomList();
  renderPhrases();
  renderCats();
}

function renderCustomList() {
  const w = document.getElementById('custom-list');
  if (!customPhrases.length) { w.innerHTML = ''; return; }
  w.innerHTML = `<div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">追加済みフレーズ</div>` +
    customPhrases.map(p => `
    <div class="custom-item">
      <div>
        <div class="ci-text">${p.jp}</div>
        <div class="ci-tl">${p.t?p.t[currentLang]||p.t.en||'':p.tl||''}</div>
      </div>
      <button class="del-btn" onclick="deleteCustom(${p.id})">削除</button>
    </div>`).join('');
}

/* ══ SCREEN ══ */
function switchScreen(n) {
  ['main','emerg','add'].forEach(s => {
    document.getElementById('sc-'+s).style.display = s===n ? 'flex' : 'none';
    document.getElementById('bn-'+s).classList.toggle('active', s===n);
  });
  if (n === 'add') { renderAddCatRow(); renderCustomList(); }
}

/* ══ INIT ══ */
function renderAll() {
  renderHeader();
  renderCats();
  renderPhrases();
  renderEmerg();
}

if (selectedJob) {
  document.getElementById('setup').classList.add('hidden');
  renderAll();
} else {
  setupJob = '';
  initSetup();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
