<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場会話">
<link rel="manifest" href="manifest.json">
<title>現場会話</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#1a3a5c;font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;}
#app{max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:#f2f4f7;overflow:hidden;position:relative;}

/* ══════════════════════════════
   SETUP WIZARD
══════════════════════════════ */
#setup{position:fixed;inset:0;z-index:500;background:#1a3a5c;display:flex;flex-direction:column;overflow:hidden;}
#setup.hidden{display:none;}

.setup-header{padding:max(env(safe-area-inset-top),16px) 20px 16px;flex-shrink:0;}
.setup-progress{display:flex;gap:6px;margin-bottom:16px;}
.setup-step-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);transition:background 0.3s;}
.setup-step-dot.done{background:#7ec8f0;}
.setup-step-dot.active{background:#fff;}
.setup-step-label{color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:0.5px;}
.setup-title{color:#fff;font-size:20px;font-weight:700;margin-top:4px;}
.setup-sub{color:rgba(255,255,255,0.55);font-size:13px;margin-top:4px;line-height:1.5;}

.setup-body{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.setup-card{padding:14px 10px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;font-family:inherit;text-align:center;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.setup-card:active{transform:scale(0.96);}
.setup-card.selected{border-color:#7ec8f0;background:rgba(126,200,240,0.2);}
.setup-card .sc-icon{font-size:28px;}
.setup-card .sc-name{font-size:13px;font-weight:700;line-height:1.3;}
.setup-card .sc-sub{font-size:10px;opacity:0.6;line-height:1.3;}
.setup-card.selected .sc-sub{opacity:0.8;}

.setup-footer{padding:12px 16px;padding-bottom:max(env(safe-area-inset-bottom),12px);flex-shrink:0;}
.setup-next{width:100%;padding:14px;border-radius:14px;background:#fff;color:#1a3a5c;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:6px;}
.setup-next:disabled{opacity:0.3;cursor:default;}
.setup-next:not(:disabled):active{transform:scale(0.98);}
.setup-back{width:100%;padding:10px;border-radius:12px;background:transparent;color:rgba(255,255,255,0.5);font-size:14px;border:none;cursor:pointer;font-family:inherit;margin-top:8px;}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.header{background:#1a3a5c;padding:10px 14px;padding-top:max(env(safe-area-inset-top),10px);flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-name{color:#fff;font-size:17px;font-weight:700;}
.header-meta{display:flex;align-items:center;gap:6px;}
.job-chip{background:rgba(255,255,255,0.15);border-radius:20px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,0.8);}
.settings-btn{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;font-family:inherit;}
.lang-switcher{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.lang-switcher::-webkit-scrollbar{display:none;}
.lsw-btn{flex:none;display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.18s;}
.lsw-btn.active{background:#fff;color:#1a3a5c;border-color:#fff;}
.lsw-btn .lf{font-size:15px;}

/* ══════════════════════════════
   CATEGORIES
══════════════════════════════ */
.cats{display:flex;background:#fff;border-bottom:1px solid #e0e6ef;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{flex:none;padding:10px 14px;font-size:12px;font-weight:600;border:none;background:none;color:#94a3b8;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.18s;}
.cat-btn.active{color:#1a3a5c;border-bottom-color:#1a3a5c;}

/* ══════════════════════════════
   PHRASE LIST
══════════════════════════════ */
.phrase-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 80px;}
.job-banner{background:linear-gradient(135deg,#1a3a5c,#2d6a9f);border-radius:12px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.job-banner-icon{font-size:22px;}
.job-banner-text{color:#fff;font-size:12px;font-weight:600;opacity:0.9;}
.job-banner-sub{color:rgba(255,255,255,0.6);font-size:10px;margin-top:1px;}
.pcard{background:#fff;border:1.5px solid #e0e6ef;border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all 0.18s;position:relative;}
.pcard:active{transform:scale(0.98);}
.pcard.selected{background:#eaf4ff;border-color:#1a3a5c;box-shadow:0 2px 12px rgba(26,58,92,0.12);}
.pcard-job-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;background:#fff3cd;color:#856404;font-weight:600;margin-bottom:6px;}
.pcard-jp{font-size:19px;font-weight:700;color:#0d1f35;line-height:1.35;}
.pcard-read{font-size:11px;color:#b0bec5;margin:2px 0 8px;}
.pcard-divider{height:1px;background:#f0f4f8;margin-bottom:8px;}
.pcard-tl{font-size:17px;font-weight:600;color:#1a3a5c;line-height:1.35;}
.pcard-btns{display:flex;gap:7px;margin-top:11px;}
.pbtn{flex:1;padding:8px 0;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform 0.12s;}
.pbtn:active{transform:scale(0.95);}
.pbtn-jp{background:#1a3a5c;color:#fff;}
.pbtn-tl{background:#ddeeff;color:#1a3a5c;}
.pcard.selected .pbtn-tl{background:#b8d8f8;}
.empty-state{text-align:center;padding:40px 20px;color:#94a3b8;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:14px;}

/* ══════════════════════════════
   EMERGENCY
══════════════════════════════ */
.emerg-list{flex:1;overflow-y:auto;padding:10px 12px 80px;}
.emerg-top{background:#fff3f3;border:1px solid #ffbaba;border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#c0392b;font-weight:600;}
.ecard{background:#fff;border:1px solid #f5a0a0;border-left:4px solid #e74c3c;border-radius:14px;padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:all 0.15s;}
.ecard:active{transform:scale(0.98);}
.ebadge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:#fde8e8;color:#c0392b;font-weight:700;margin-bottom:5px;}
.ecard-jp{font-size:18px;font-weight:700;color:#0d1f35;}
.ecard-tl{font-size:15px;font-weight:600;color:#1a3a5c;margin-top:6px;}
.ecard-btns{display:flex;gap:8px;margin-top:10px;}
.ebtn{flex:1;padding:9px 0;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;}
.ebtn-jp{background:#1a3a5c;color:#fff;}
.ebtn-tl{background:#ddeeff;color:#1a3a5c;}

/* ══════════════════════════════
   ADD PHRASE
══════════════════════════════ */
.add-screen{flex:1;overflow-y:auto;padding:14px 14px 80px;}
.add-section{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #e0e6ef;}
.add-label{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
.add-input{width:100%;padding:11px 12px;border:1.5px solid #e0e6ef;border-radius:10px;font-size:15px;font-family:inherit;color:#0d1f35;background:#f8fafc;outline:none;transition:border-color 0.18s;}
.add-input:focus{border-color:#1a3a5c;}
.add-input::placeholder{color:#b0bec5;}
.add-cat-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.add-cat-opt{padding:6px 14px;border-radius:20px;border:1.5px solid #e0e6ef;background:#fff;color:#1a3a5c;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.add-cat-opt.selected{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.add-save{width:100%;padding:14px;border-radius:12px;background:#1a3a5c;color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:transform 0.15s;}
.add-save:active{transform:scale(0.98);}
.translate-btn{width:100%;padding:11px;border-radius:10px;border:1.5px solid #1a3a5c;background:#fff;color:#1a3a5c;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.18s;}
.translate-btn:disabled{opacity:0.35;cursor:default;}
.translate-status{font-size:12px;margin-top:7px;padding:8px 12px;border-radius:8px;display:none;line-height:1.4;}
.translate-status.loading{display:block;background:#f0f4ff;color:#1a3a5c;}
.translate-status.success{display:block;background:#e8f8ee;color:#0a6644;}
.translate-status.error{display:block;background:#fff0f0;color:#c0392b;}
.lang-translate-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.ltag{padding:5px 12px;border-radius:20px;border:1.5px solid #e0e6ef;background:#fff;color:#1a3a5c;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.ltag.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.custom-list{margin-top:0;}
.custom-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0e6ef;border-radius:10px;padding:11px 13px;margin-bottom:7px;}
.custom-item-text{font-size:14px;color:#0d1f35;font-weight:600;}
.custom-item-tl{font-size:12px;color:#94a3b8;margin-top:2px;}
.del-btn{padding:5px 10px;border-radius:8px;border:1px solid #fde8e8;background:#fff5f5;color:#e74c3c;font-size:12px;cursor:pointer;font-family:inherit;}

/* ══════════════════════════════
   BOTTOM NAV
══════════════════════════════ */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:#fff;border-top:1px solid #e0e6ef;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.bnav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#94a3b8;border:none;background:none;cursor:pointer;font-family:inherit;transition:color 0.18s;}
.bnav-btn .bni{font-size:20px;}
.bnav-btn.active{color:#1a3a5c;}

/* RESPONSIVE */
@media (max-height:700px){
  .setup-card{padding:10px 8px;}
  .setup-card .sc-icon{font-size:24px;}
  .setup-card .sc-name{font-size:12px;}
  .setup-title{font-size:18px;}
  .setup-sub{font-size:12px;}
}
@media (max-width:375px){
  .setup-grid{gap:7px;}
  .setup-card .sc-name{font-size:11px;}
}
</style>
</head>
<body>
<div id="app">

<!-- ══ SETUP WIZARD ══ -->
<div id="setup">
  <div class="setup-header">
    <div class="setup-progress">
      <div class="setup-step-dot active" id="dot-1"></div>
      <div class="setup-step-dot" id="dot-2"></div>
    </div>
    <div class="setup-step-label" id="setup-step-label">STEP 1 / 2</div>
    <div class="setup-title" id="setup-title">職種を選んでください</div>
    <div class="setup-sub" id="setup-sub">Job Category — あなたの現場はどれですか？</div>
  </div>

  <div class="setup-body" id="setup-body"></div>

  <div class="setup-footer">
    <button class="setup-next" id="setup-next" onclick="setupNext()" disabled>
      次へ →
    </button>
    <button class="setup-back" id="setup-back" onclick="setupBack()" style="display:none;">
      ← 戻る
    </button>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div class="header">
  <div class="header-top">
    <div class="app-name">現場会話</div>
    <div class="header-meta">
      <div class="job-chip" id="job-chip"></div>
      <button class="settings-btn" onclick="showSetup()">設定 ⚙</button>
    </div>
  </div>
  <div class="lang-switcher" id="lang-switcher"></div>
</div>

<div class="cats" id="cats"></div>

<div id="screen-main" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
  <div class="phrase-list" id="phrase-list"></div>
</div>

<div id="screen-emerg" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="emerg-list">
    <div class="emerg-top">🚨 タップで音声再生 — オフライン対応</div>
    <div id="emerg-list"></div>
  </div>
</div>

<div id="screen-add" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="add-screen">
    <div class="add-section">
      <div class="add-label">① 日本語フレーズを入力</div>
      <input class="add-input" id="add-jp" type="text" placeholder="例：休憩してください" oninput="onJpInput()">
      <div class="add-label" style="margin-top:12px;">② 翻訳する言語を選択</div>
      <div class="lang-translate-row" id="lang-translate-row"></div>
      <button class="translate-btn" id="translate-btn" onclick="autoTranslate()" disabled>🌐 自動翻訳する</button>
      <div class="translate-status" id="translate-status"></div>
      <div class="add-label" style="margin-top:12px;">③ 翻訳結果（修正可）</div>
      <input class="add-input" id="add-tl" type="text" placeholder="翻訳後に自動入力されます">
      <div class="add-label" style="margin-top:12px;">④ カテゴリー</div>
      <div class="add-cat-row" id="add-cat-row"></div>
    </div>
    <button class="add-save" onclick="savePhrase()">＋ 追加する</button>
    <div id="custom-list" class="custom-list" style="margin-top:12px;"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" id="bn-main" onclick="switchScreen('main')"><span class="bni">💬</span>会話</button>
  <button class="bnav-btn" id="bn-emerg" onclick="switchScreen('emerg')"><span class="bni">🚨</span>緊急</button>
  <button class="bnav-btn" id="bn-add" onclick="switchScreen('add')"><span class="bni">＋</span>追加</button>
</div>

</div><!-- #app -->

<script>
/* ══════════════════════════════
   MASTER DATA
══════════════════════════════ */

// 職種マスター（今後追加しやすい構造）
const JOBS = [

const ALL_LANGS = {

  {id:2,  jobs:'all', cat:'work',    jp:'こっちに来てください',         read:'こっちにきてください',           t:{en:'Please come here',vi:'Vui lòng lại đây',id:'Tolong ke sini',zh:'请过来',tl:'Pakihalika',my:'ဒီကိုလာပေးပါ',th:'กรุณามาที่นี่',ne:'यहाँ आउनुस्',km:'សូមមកទីនេះ'}},
  {id:3,  jobs:'all', cat:'work',    jp:'ゆっくりやってください',       read:'ゆっくりやってください',         t:{en:'Please do it slowly',vi:'Làm chậm thôi',id:'Lakukan perlahan',zh:'请慢慢来',tl:'Dahan-dahan lang',my:'တဖြည်းဖြည်းလုပ်ပေးပါ',th:'ค่อยๆ ทำ',ne:'बिस्तारै गर्नुस्',km:'សូមធ្វើយឺតៗ'}},
  {id:4,  jobs:'all', cat:'work',    jp:'もう一度やってください',       read:'もういちどやってください',       t:{en:'Please do it again',vi:'Làm lại đi',id:'Tolong lakukan lagi',zh:'请再做一遍',tl:'Gawin ulit',my:'နောက်တစ်ကြိမ်လုပ်ပေးပါ',th:'ทำอีกครั้ง',ne:'फेरि गर्नुस्',km:'សូមធ្វើម្ដងទៀត'}},
  {id:5,  jobs:'all', cat:'work',    jp:'手伝ってください',             read:'てつだってください',             t:{en:'Please help me',vi:'Giúp tôi với',id:'Tolong bantu',zh:'请帮我',tl:'Tulungan mo ako',my:'ကူညီပေးပါ',th:'ช่วยหน่อย',ne:'मद्दत गर्नुस्',km:'ជួយខ្ញុំផង'}},
  {id:6,  jobs:'all', cat:'work',    jp:'ここに置いてください',         read:'ここにおいてください',           t:{en:'Please put it here',vi:'Đặt vào đây',id:'Taruh di sini',zh:'请放在这里',tl:'Ilagay dito',my:'ဒီမှာထားပေးပါ',th:'วางไว้ที่นี่',ne:'यहाँ राख्नुस्',km:'ដាក់ទីនេះ'}},

// Setup wizard state
let setupStep      = 1; // 1=job, 2=lang
let setupJob       = '';

/* ══════════════════════════════
   SETUP WIZARD
══════════════════════════════ */
function renderSetupStep1() {
  setupStep = 1;
  document.getElementById('dot-1').className = 'setup-step-dot active';
  document.getElementById('dot-2').className = 'setup-step-dot';
  document.getElementById('setup-step-label').textContent = 'STEP 1 / 2';
  document.getElementById('setup-title').textContent = '職種を選んでください';
  document.getElementById('setup-sub').textContent = 'Job Category — あなたの現場はどれですか？';
  document.getElementById('setup-next').textContent = '次へ →';
  document.getElementById('setup-next').disabled = !setupJob;
  document.getElementById('setup-back').style.display = 'none';

  document.getElementById('setup-body').innerHTML = `
    <div class="setup-grid">
      ${JOBS.map(j => `
        <button class="setup-card${setupJob===j.id?' selected':''}" onclick="selectJob('${j.id}')">
          <span class="sc-icon">${j.icon}</span>
          <span class="sc-name">${j.name}</span>
          <span class="sc-sub">${j.sub}</span>
        </button>`).join('')}
    </div>`;
}

function renderSetupStep2() {
  setupStep = 2;
  document.getElementById('dot-1').className = 'setup-step-dot done';
  document.getElementById('dot-2').className = 'setup-step-dot active';
  document.getElementById('setup-step-label').textContent = 'STEP 2 / 2';
  document.getElementById('setup-title').textContent = '言語を選んでください';
  document.getElementById('setup-sub').textContent = 'Language — 複数選択できます（後で変更可）';
  document.getElementById('setup-next').textContent = 'はじめる ✓';
  document.getElementById('setup-next').disabled = setupLangs.size === 0;
  document.getElementById('setup-back').style.display = 'block';

  document.getElementById('setup-body').innerHTML = `
    <div class="setup-grid">
      ${Object.entries(ALL_LANGS).map(([code, L]) => `
        <button class="setup-card${setupLangs.has(code)?' selected':''}" onclick="toggleLang('${code}')">
          <span class="sc-icon">${L.flag}</span>
          <span class="sc-name">${L.name}</span>
          <span class="sc-sub">${code.toUpperCase()}</span>
        </button>`).join('')}
    </div>`;
}

function selectJob(id) {
  setupJob = id;
  document.querySelectorAll('.setup-card').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('setup-next').disabled = false;
}

function toggleLang(code) {
  if (setupLangs.has(code)) setupLangs.delete(code);
  else setupLangs.add(code);
  renderSetupStep2();
}

function setupNext() {
  if (setupStep === 1) {
    if (!setupJob) return;
    renderSetupStep2();
  } else {
    if (setupLangs.size === 0) return;
    // Save
    selectedJob  = setupJob;
    activeLangs  = [...setupLangs];
    currentLang  = activeLangs[0];
    localStorage.setItem('genba-job',     selectedJob);
    localStorage.setItem('genba-langs',   JSON.stringify(activeLangs));
    localStorage.setItem('genba-current', currentLang);
    document.getElementById('setup').classList.add('hidden');
    renderAll();
  }
}

function setupBack() {
  renderSetupStep1();
}

function showSetup() {
  setupJob   = selectedJob;
  setupLangs = new Set(activeLangs);
  setupStep  = 1;
  renderSetupStep1();
  document.getElementById('setup').classList.remove('hidden');
}

/* ══════════════════════════════
   HELPERS
══════════════════════════════ */
function tl(p) {
  if (p.t) return p.t[currentLang] || p.t.en || '';
  return p.tl || '';
}
function bcp() { return ALL_LANGS[currentLang]?.bcp || 'en-US'; }
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function speak(text, lang) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'ja-JP'; u.rate = 0.85;
  speechSynthesis.speak(u);
}

function phraseMatchesJob(p) {
  if (p.jobs === 'all') return true;
  if (Array.isArray(p.jobs)) return p.jobs.includes(selectedJob);
  return true;
}

    const L = ALL_LANGS[code];
    return `<button class="lsw-btn${code===currentLang?' active':''}" onclick="switchLang('${code}')">
      <span class="lf">${L.flag}</span>${L.name}
    </button>`;
  }).join('');
}

function switchLang(code) {
  currentLang = code;
  localStorage.setItem('genba-current', code);
  renderSwitcher();
  renderPhrases();
  renderEmerg();
}

/* ══════════════════════════════
   CATEGORIES
══════════════════════════════ */
function renderCats() {
  document.getElementById('cats').innerHTML = CATS_DEF.map(c =>
    `<button class="cat-btn${c.id===cat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function setCat(id) { cat = id; selectedCard = null; renderCats(); renderPhrases(); }

/* ══════════════════════════════
   PHRASE LIST
══════════════════════════════ */
function renderPhrases() {
  const job = JOBS.find(j => j.id === selectedJob);
  let list = [...PHRASES, ...customPhrases].filter(p => {
    const catMatch = cat === 'all' || p.cat === cat;
    const jobMatch = phraseMatchesJob(p);
    return catMatch && jobMatch;
  });

  // Job-specific phrases banner
  const jobSpecific = list.filter(p => p.jobs !== 'all' && Array.isArray(p.jobs));
  const bannerHTML = jobSpecific.length > 0 && cat === 'all' ? `
    <div class="job-banner">
      <span class="job-banner-icon">${job?.icon||'💼'}</span>
      <div>
        <div class="job-banner-text">${job?.name||''}専用フレーズを表示中</div>
        <div class="job-banner-sub">${jobSpecific.length}件の専用フレーズが含まれています</div>
      </div>
    </div>` : '';

  if (list.length === 0) {
    document.getElementById('phrase-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">このカテゴリーにフレーズがありません</div>
      </div>`;
    return;
  }

  document.getElementById('phrase-list').innerHTML = bannerHTML + list.map(p => {
    const tlText = tl(p);
    const isJobSpecific = Array.isArray(p.jobs) && p.jobs.length > 0;
    return `<div class="pcard${selectedCard===p.id?' selected':''}" id="pc-${p.id}" onclick="selectCard(${p.id})">
      ${isJobSpecific && !p.custom ? `<span class="pcard-job-tag">${job?.icon||''} ${job?.name||''}</span>` : ''}
      ${p.custom ? `<span class="pcard-job-tag">カスタム</span>` : ''}
      <div class="pcard-jp">${p.jp}</div>
      <div class="pcard-read">${p.read||''}</div>
      <div class="pcard-divider"></div>
      <div class="pcard-tl">${tlText}</div>
      <div class="pcard-btns">
        <button class="pbtn pbtn-jp" onclick="event.stopPropagation();speak('${esc(p.jp)}','ja-JP')">🔊 日本語</button>
        <button class="pbtn pbtn-tl" onclick="event.stopPropagation();speak('${esc(tlText)}','${bcp()}')">🔊 ${ALL_LANGS[currentLang]?.name||'EN'}</button>
      </div>
    </div>`;
  }).join('');
}

function selectCard(id) {
  const allPhrases = [...PHRASES, ...customPhrases];
  const p = allPhrases.find(x => x.id === id); if (!p) return;
  if (selectedCard === id) {
    selectedCard = null;
    document.getElementById('pc-'+id)?.classList.remove('selected');
    return;
  }
  if (selectedCard) document.getElementById('pc-'+selectedCard)?.classList.remove('selected');
  selectedCard = id;
  document.getElementById('pc-'+id)?.classList.add('selected');
  const tlText = tl(p);
  speechSynthesis.cancel();
  const ujp = new SpeechSynthesisUtterance(p.jp); ujp.lang='ja-JP'; ujp.rate=0.85;
  const utl = new SpeechSynthesisUtterance(tlText); utl.lang=bcp(); utl.rate=0.85;
  ujp.onend = () => setTimeout(() => speechSynthesis.speak(utl), 300);
  speechSynthesis.speak(ujp);
}

/* ══════════════════════════════
   EMERGENCY
══════════════════════════════ */
function renderEmerg() {
  document.getElementById('emerg-list').innerHTML = EMERG.map(e => {
    const tlText = e.t[currentLang] || e.t.en;
    return `<div class="ecard">
      ${e.badge?`<div class="ebadge">${e.badge}</div>`:''}
      <div class="ecard-jp">${e.jp}</div>
      <div class="ecard-tl">${tlText}</div>
      <div class="ecard-btns">
        <button class="ebtn ebtn-jp" onclick="speak('${esc(e.jp)}','ja-JP')">🔊 日本語</button>
        <button class="ebtn ebtn-tl" onclick="speak('${esc(tlText)}','${bcp()}')">🔊 ${ALL_LANGS[currentLang]?.name||'EN'}</button>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════
   ADD PHRASE + AUTO TRANSLATE
══════════════════════════════ */
function renderLangTranslateRow() {
  if (!translateLang && activeLangs.length > 0) translateLang = currentLang || activeLangs[0];
  const row = document.getElementById('lang-translate-row'); if (!row) return;
  row.innerHTML = activeLangs.map(code => {
    const L = ALL_LANGS[code];
    return `<button class="ltag${translateLang===code?' active':''}" onclick="setTranslateLang('${code}')">${L.flag} ${L.name}</button>`;
  }).join('');
}

function setTranslateLang(code) { translateLang = code; renderLangTranslateRow(); checkTranslateReady(); }

function onJpInput() {
  checkTranslateReady();
  document.getElementById('translate-status').className = 'translate-status';
  document.getElementById('translate-status').textContent = '';
}

function checkTranslateReady() {
  const jp = document.getElementById('add-jp').value.trim();
  const btn = document.getElementById('translate-btn');
  if (btn) btn.disabled = !(jp && translateLang);
}

async function autoTranslate() {
  const jp = document.getElementById('add-jp').value.trim();
  if (!jp || !translateLang) return;
  const btn = document.getElementById('translate-btn');
  const status = document.getElementById('translate-status');
  const L = ALL_LANGS[translateLang];
  btn.disabled = true; btn.textContent = '🌐 翻訳中...';
  status.className = 'translate-status loading';
  status.textContent = `${L.flag} ${L.name}に翻訳しています...`;
  const langMap = {en:'en-US',vi:'vi-VN',id:'id-ID',zh:'zh-CN',tl:'tl-PH',my:'my-MM',th:'th-TH',ne:'ne-NP',km:'km-KH'};
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(jp)}&langpair=ja|${langMap[translateLang]||translateLang}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData?.translatedText) {
      document.getElementById('add-tl').value = data.responseData.translatedText;
      status.className = 'translate-status success';
      status.textContent = `✓ ${L.flag} 翻訳完了 — 内容を確認・修正してください`;
    } else throw new Error();
  } catch {
    status.className = 'translate-status error';
    status.textContent = '⚠ 翻訳できませんでした。手動で入力してください。';
  } finally {
    btn.disabled = false; btn.innerHTML = '🌐 自動翻訳する';
  }
}

function renderAddCatRow() {
  document.getElementById('add-cat-row').innerHTML = CATS_DEF.filter(c=>c.id!=='all').map(c=>
    `<button class="add-cat-opt${addCat===c.id?' selected':''}" onclick="setAddCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function setAddCat(id) { addCat = id; renderAddCatRow(); }

function savePhrase() {
  const jp = document.getElementById('add-jp').value.trim();
  const tlVal = document.getElementById('add-tl').value.trim();
  if (!jp || !tlVal) { alert('日本語と外国語の両方を入力してください'); return; }
  const p = { id:nextCustomId++, jobs:'all', cat:addCat, jp, read:'', tl:tlVal, custom:true };
  customPhrases.push(p);
  localStorage.setItem('genba-custom', JSON.stringify(customPhrases));
  localStorage.setItem('genba-next-id', String(nextCustomId));
  document.getElementById('add-jp').value = '';
  document.getElementById('add-tl').value = '';
  document.getElementById('translate-status').className = 'translate-status';
  renderCustomList(); renderPhrases();
  alert('追加しました！');
}

function deleteCustom(id) {
  customPhrases = customPhrases.filter(p => p.id !== id);
  localStorage.setItem('genba-custom', JSON.stringify(customPhrases));
  renderCustomList(); renderPhrases();
}

function renderCustomList() {
  const wrap = document.getElementById('custom-list'); if (!wrap) return;
  if (customPhrases.length === 0) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `<div class="add-label" style="margin-bottom:8px;">追加済みフレーズ</div>` +
    customPhrases.map(p => `
    <div class="custom-item">
      <div><div class="custom-item-text">${p.jp}</div><div class="custom-item-tl">${p.tl}</div></div>
      <button class="del-btn" onclick="deleteCustom(${p.id})">削除</button>
    </div>`).join('');
}

/* ══════════════════════════════
   SCREEN SWITCH
══════════════════════════════ */
function switchScreen(name) {
  ['main','emerg','add'].forEach(s => {
    document.getElementById('screen-'+s).style.display = s===name ? 'flex' : 'none';
  });
  ['main','emerg','add'].forEach(s => {
    document.getElementById('bn-'+s).classList.toggle('active', s===name);
  });
  if (name==='add') { renderAddCatRow(); renderCustomList(); renderLangTranslateRow(); checkTranslateReady(); }
}

/* ══════════════════════════════
   INIT
══════════════════════════════ */
function renderAll() {
  renderHeader();
  renderCats();
  renderPhrases();
  renderEmerg();
}

// 初回 or 設定済み
if (selectedJob && activeLangs.length > 0 && currentLang) {
  document.getElementById('setup').classList.add('hidden');
  renderAll();
} else {
  setupJob = selectedJob;
  setupLangs = new Set(activeLangs);
  renderSetupStep1();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
