<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場会話">
<link rel="manifest" href="manifest.json">
<title>現場会話</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#1a3a5c;font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;}
#app{max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:#f2f4f7;overflow:hidden;}

/* SETUP */
#setup{position:fixed;inset:0;z-index:500;background:#1a3a5c;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;}
#setup.hidden{display:none;}
.setup-title{color:#fff;font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;}
.setup-sub{color:rgba(255,255,255,0.5);font-size:13px;text-align:center;margin-bottom:24px;line-height:1.6;}
.setup-hint{color:rgba(255,255,255,0.35);font-size:11px;text-align:center;margin-top:16px;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:340px;}
.setup-lang{padding:13px 10px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.setup-lang:active{transform:scale(0.96);background:rgba(255,255,255,0.18);}
.setup-lang.selected{border-color:#7ec8f0;background:rgba(126,200,240,0.2);}
.setup-lang .sflag{font-size:26px;}
.setup-lang .sname{font-size:11px;opacity:0.65;}
.setup-done{margin-top:20px;padding:14px 40px;border-radius:14px;background:#fff;color:#1a3a5c;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:transform 0.15s;}
.setup-done:active{transform:scale(0.97);}
.setup-done:disabled{opacity:0.4;cursor:default;}

/* HEADER */
.header{background:#1a3a5c;padding:10px 14px;padding-top:max(env(safe-area-inset-top),10px);flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-name{color:#fff;font-size:17px;font-weight:700;}
.header-actions{display:flex;gap:8px;}
.hbtn{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.75);font-size:12px;cursor:pointer;font-family:inherit;}

/* LANG SWITCHER */
.lang-switcher{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.lang-switcher::-webkit-scrollbar{display:none;}
.lsw-btn{flex:none;display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.18s;}
.lsw-btn.active{background:#fff;color:#1a3a5c;border-color:#fff;}
.lsw-btn .lf{font-size:16px;}
.lsw-add{flex:none;padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;font-family:inherit;}

/* CATEGORIES */
.cats{display:flex;background:#fff;border-bottom:1px solid #e0e6ef;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{flex:none;padding:10px 15px;font-size:12px;font-weight:600;border:none;background:none;color:#94a3b8;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.18s;}
.cat-btn.active{color:#1a3a5c;border-bottom-color:#1a3a5c;}

/* PHRASE LIST */
.phrase-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 80px;}

/* PHRASE CARD — highlight mode */
.pcard{background:#fff;border:1.5px solid #e0e6ef;border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all 0.18s;position:relative;}
.pcard.selected{background:#eaf4ff;border-color:#1a3a5c;box-shadow:0 2px 12px rgba(26,58,92,0.15);}
.pcard-jp{font-size:19px;font-weight:700;color:#0d1f35;line-height:1.35;}
.pcard-read{font-size:11px;color:#b0bec5;margin:2px 0 8px;}
.pcard-divider{height:1px;background:#f0f4f8;margin-bottom:8px;}
.pcard-tl{font-size:17px;font-weight:600;color:#1a3a5c;line-height:1.35;}
.pcard.selected .pcard-tl{color:#0a2d52;}
.pcard-btns{display:flex;gap:7px;margin-top:11px;}
.pbtn{flex:1;padding:8px 0;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform 0.12s;}
.pbtn:active{transform:scale(0.95);}
.pbtn-jp{background:#1a3a5c;color:#fff;}
.pbtn-tl{background:#ddeeff;color:#1a3a5c;}
.pcard.selected .pbtn-tl{background:#b8d8f8;}
.pcard-custom-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 7px;border-radius:8px;background:#fff3cd;color:#856404;font-weight:600;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:#fff;border-top:1px solid #e0e6ef;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#94a3b8;border:none;background:none;cursor:pointer;font-family:inherit;transition:color 0.18s;}
.bnav-btn .bni{font-size:20px;}
.bnav-btn.active{color:#1a3a5c;}

/* EMERGENCY SCREEN */
.emerg-list{flex:1;overflow-y:auto;padding:10px 12px 80px;}
.emerg-top{background:#fff3f3;border:1px solid #ffbaba;border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#c0392b;font-weight:600;}
.ecard{background:#fff;border:1px solid #f5a0a0;border-left:4px solid #e74c3c;border-radius:14px;padding:13px 14px;margin-bottom:9px;}
.ecard:active{transform:scale(0.98);}
.ebadge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:#fde8e8;color:#c0392b;font-weight:700;margin-bottom:5px;}
.ecard-jp{font-size:18px;font-weight:700;color:#0d1f35;}
.ecard-tl{font-size:15px;font-weight:600;color:#1a3a5c;margin-top:6px;}
.ecard-btns{display:flex;gap:8px;margin-top:10px;}
.ebtn{flex:1;padding:9px 0;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;}
.ebtn-jp{background:#1a3a5c;color:#fff;}
.ebtn-tl{background:#ddeeff;color:#1a3a5c;}

/* ADD PHRASE SCREEN */
.add-screen{flex:1;overflow-y:auto;padding:14px 14px 80px;}
.add-section{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #e0e6ef;}
.add-label{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
.add-input{width:100%;padding:11px 12px;border:1.5px solid #e0e6ef;border-radius:10px;font-size:15px;font-family:inherit;color:#0d1f35;background:#f8fafc;outline:none;transition:border-color 0.18s;}
.add-input:focus{border-color:#1a3a5c;}
.add-input::placeholder{color:#b0bec5;}
.add-cat-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.add-cat-opt{padding:6px 14px;border-radius:20px;border:1.5px solid #e0e6ef;background:#fff;color:#1a3a5c;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.add-cat-opt.selected{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.add-save{width:100%;padding:14px;border-radius:12px;background:#1a3a5c;color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:transform 0.15s;}
.add-save:active{transform:scale(0.98);}
.custom-list{margin-top:0;}
.custom-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0e6ef;border-radius:10px;padding:11px 13px;margin-bottom:7px;}
.custom-item-text{font-size:14px;color:#0d1f35;font-weight:600;}
.custom-item-tl{font-size:12px;color:#94a3b8;margin-top:2px;}
.del-btn{padding:5px 10px;border-radius:8px;border:1px solid #fde8e8;background:#fff5f5;color:#e74c3c;font-size:12px;cursor:pointer;font-family:inherit;}
.translate-btn{width:100%;padding:11px;border-radius:10px;border:1.5px solid #1a3a5c;background:#fff;color:#1a3a5c;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.18s;}
.translate-btn:active{background:#eaf4ff;}
.translate-btn:disabled{opacity:0.35;cursor:default;}
.translate-status{font-size:12px;margin-top:7px;padding:8px 12px;border-radius:8px;display:none;line-height:1.4;}
.translate-status.loading{display:block;background:#f0f4ff;color:#1a3a5c;}
.translate-status.success{display:block;background:#e8f8ee;color:#0a6644;}
.translate-status.error{display:block;background:#fff0f0;color:#c0392b;}
.lang-translate-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.ltag{padding:5px 12px;border-radius:20px;border:1.5px solid #e0e6ef;background:#fff;color:#1a3a5c;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.ltag.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}

/* MODAL / SHEET */
.sheet-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.35);}
.sheet-overlay.open{display:block;}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-radius:20px 20px 0 0;padding:14px 0 env(safe-area-inset-bottom,20px);z-index:401;}
.sheet-handle{width:36px;height:4px;background:#d0d8e4;border-radius:2px;margin:0 auto 14px;}
.sheet-title{font-size:14px;font-weight:700;color:#1a3a5c;padding:0 18px 12px;}
.sheet-lang-item{display:flex;align-items:center;gap:12px;padding:12px 18px;font-size:14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;color:#0d1f35;transition:background 0.15s;}
.sheet-lang-item:hover{background:#f4f6f9;}
.sheet-lang-item.active{font-weight:700;color:#1a3a5c;}
.sheet-lang-item .sflag2{font-size:22px;}
.sheet-lang-item .scheck{margin-left:auto;color:#1a3a5c;}

</style>
</head>
<body>
<div id="app">

<!-- SETUP: 初回のみ -->
<div id="setup">
  <div class="setup-title">使用言語を選んでください</div>
  <div class="setup-sub">現場にいる外国人の言語を<br>複数選べます（後で変更可）</div>
  <div class="setup-grid" id="setup-grid"></div>
  <button class="setup-done" id="setup-done" onclick="finishSetup()" disabled>決定 →</button>
  <div class="setup-hint">※ あとからいつでも変更できます</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="app-name">現場会話</div>
    <div class="header-actions">
      <button class="hbtn" onclick="showSetup()">言語設定 ⚙</button>
    </div>
  </div>
  <div class="lang-switcher" id="lang-switcher"></div>
</div>

<!-- CATEGORIES -->
<div class="cats" id="cats"></div>

<!-- SCREENS -->
<div id="screen-main" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
  <div class="phrase-list" id="phrase-list"></div>
</div>

<div id="screen-emerg" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="emerg-list">
    <div class="emerg-top">🚨 タップで音声再生 — オフライン対応</div>
    <div id="emerg-list"></div>
  </div>
</div>

<div id="screen-add" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="add-screen">
    <div class="add-section">
      <div class="add-label">① 日本語フレーズを入力</div>
      <input class="add-input" id="add-jp" type="text" placeholder="例：休憩してください" oninput="onJpInput()">

      <div class="add-label" style="margin-top:12px;">② 翻訳する言語を選択</div>
      <div class="lang-translate-row" id="lang-translate-row"></div>

      <button class="translate-btn" id="translate-btn" onclick="autoTranslate()" disabled>
        🌐 自動翻訳する
      </button>
      <div class="translate-status" id="translate-status"></div>

      <div class="add-label" style="margin-top:12px;">③ 翻訳結果（修正可）</div>
      <input class="add-input" id="add-tl" type="text" placeholder="翻訳後に自動入力されます">

      <div class="add-label" style="margin-top:12px;">④ カテゴリー</div>
      <div class="add-cat-row" id="add-cat-row"></div>
    </div>
    <button class="add-save" onclick="savePhrase()">＋ 追加する</button>
    <div id="custom-list" class="custom-list" style="margin-top:12px;"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bnav-btn active" id="bn-main" onclick="switchScreen('main')"><span class="bni">💬</span>会話</button>
  <button class="bnav-btn" id="bn-emerg" onclick="switchScreen('emerg')"><span class="bni">🚨</span>緊急</button>
  <button class="bnav-btn" id="bn-add" onclick="switchScreen('add')"><span class="bni">＋</span>追加</button>
</div>

</div>

<!-- LANG ADD SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title">言語を追加 / Add language</div>
    <div id="sheet-lang-list"></div>
  </div>
</div>

// STATE
let activeLangs = JSON.parse(localStorage.getItem('genba-langs')||'[]');
let currentLang = localStorage.getItem('genba-current')||'';
let cat = 'all';
let selectedCard = null;
let addCat = 'work';
let customPhrases = JSON.parse(localStorage.getItem('genba-custom')||'[]');
let nextCustomId = parseInt(localStorage.getItem('genba-next-id')||'1000');
let setupSelected = new Set();

// SETUP
function initSetupGrid(){
  const g = document.getElementById('setup-grid');
  g.innerHTML = Object.entries(ALL_LANGS).map(([code,L])=>
    `<button class="setup-lang${setupSelected.has(code)?' selected':''}" onclick="toggleSetup('${code}')" id="sl-${code}">
      <span class="sflag">${L.flag}</span>${L.name}<span class="sname">${code.toUpperCase()}</span>
    </button>`
  ).join('');
}

function toggleSetup(code){
  if(setupSelected.has(code)) setupSelected.delete(code);
  else setupSelected.add(code);
  document.querySelectorAll('.setup-lang').forEach(el=>el.classList.remove('selected'));
  setupSelected.forEach(c=>{ const el=document.getElementById('sl-'+c); if(el)el.classList.add('selected'); });
  document.getElementById('setup-done').disabled = setupSelected.size===0;
}

function finishSetup(){
  if(setupSelected.size===0) return;
  activeLangs = [...setupSelected];
  currentLang = activeLangs[0];
  localStorage.setItem('genba-langs', JSON.stringify(activeLangs));
  localStorage.setItem('genba-current', currentLang);
  document.getElementById('setup').classList.add('hidden');
  renderAll();
}

function showSetup(){
  setupSelected = new Set(activeLangs);
  initSetupGrid();
  document.getElementById('setup-done').disabled = setupSelected.size===0;
  document.getElementById('setup').classList.remove('hidden');
}

// LANG SWITCHER
function renderSwitcher(){
  const wrap = document.getElementById('lang-switcher');
  wrap.innerHTML = activeLangs.map(code=>{
    const L = ALL_LANGS[code];
    return `<button class="lsw-btn${code===currentLang?' active':''}" onclick="switchLang('${code}')">
      <span class="lf">${L.flag}</span>${L.name}
    </button>`;
  }).join('');
}

function switchLang(code){
  currentLang = code;
  localStorage.setItem('genba-current', code);
  renderSwitcher();
  renderPhrases();
  renderEmerg();
  renderAddCatRow();
}

// HELPERS
function tl(p){ return p.t ? (p.t[currentLang]||p.t.en||'') : (p.tl||''); }
function bcp(){ return ALL_LANGS[currentLang]?.bcp||'en-US'; }
function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function speak(text, lang){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang||'ja-JP'; u.rate = 0.85;
  speechSynthesis.speak(u);
}

// CATEGORIES
function renderCats(){
  document.getElementById('cats').innerHTML = CATS_DEF.map(c=>
    `<button class="cat-btn${c.id===cat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function setCat(id){ cat=id; selectedCard=null; renderCats(); renderPhrases(); }

// PHRASES — highlight mode
function renderPhrases(){
  const allPhrases = [...PHRASES, ...customPhrases];
  const list = cat==='all' ? allPhrases : allPhrases.filter(p=>p.cat===cat);
  document.getElementById('phrase-list').innerHTML = list.map(p=>{
    const tlText = tl(p);
    const isCustom = p.custom;
    const isSel = selectedCard===p.id;
    return `<div class="pcard${isSel?' selected':''}" id="pc-${p.id}" onclick="selectCard(${p.id})">
      ${isCustom?`<span class="pcard-custom-badge">カスタム</span>`:''}
      <div class="pcard-jp">${p.jp}</div>
      <div class="pcard-read">${p.read||''}</div>
      <div class="pcard-divider"></div>
      <div class="pcard-tl">${tlText}</div>
      <div class="pcard-btns">
        <button class="pbtn pbtn-jp" onclick="event.stopPropagation();speak('${esc(p.jp)}','ja-JP')">🔊 日本語</button>
        <button class="pbtn pbtn-tl" onclick="event.stopPropagation();speak('${esc(tlText)}','${bcp()}')">🔊 ${ALL_LANGS[currentLang]?.name||'EN'}</button>
      </div>
    </div>`;
  }).join('');
}

function selectCard(id){
  const allPhrases = [...PHRASES, ...customPhrases];
  const p = allPhrases.find(x=>x.id===id);
  if(!p) return;

  // ハイライト切り替え
  if(selectedCard===id){
    selectedCard=null;
    document.getElementById('pc-'+id)?.classList.remove('selected');
    return;
  }
  // 前の選択を解除
  if(selectedCard){
    document.getElementById('pc-'+selectedCard)?.classList.remove('selected');
  }
  selectedCard = id;
  document.getElementById('pc-'+id)?.classList.add('selected');

  // 日本語→外国語の順で音声再生
  const tlText = tl(p);
  speechSynthesis.cancel();
  const ujp = new SpeechSynthesisUtterance(p.jp);
  ujp.lang='ja-JP'; ujp.rate=0.85;
  const utl = new SpeechSynthesisUtterance(tlText);
  utl.lang=bcp(); utl.rate=0.85;
  ujp.onend=()=>{ setTimeout(()=>speechSynthesis.speak(utl),300); };
  speechSynthesis.speak(ujp);
}

// EMERGENCY
function renderEmerg(){
  document.getElementById('emerg-list').innerHTML = EMERG.map(e=>{
    const tlText = e.t[currentLang]||e.t.en;
    return `<div class="ecard">
      ${e.badge?`<div class="ebadge">${e.badge}</div>`:''}
      <div class="ecard-jp">${e.jp}</div>
      <div class="ecard-tl">${tlText}</div>
      <div class="ecard-btns">
        <button class="ebtn ebtn-jp" onclick="speak('${esc(e.jp)}','ja-JP')">🔊 日本語</button>
        <button class="ebtn ebtn-tl" onclick="speak('${esc(tlText)}','${bcp()}')">🔊 ${ALL_LANGS[currentLang]?.name||'EN'}</button>
      </div>
    </div>`;
  }).join('');
}

// ADD PHRASE
function renderAddCatRow(){
  document.getElementById('add-cat-row').innerHTML = CATS_DEF.filter(c=>c.id!=='all').map(c=>
    `<button class="add-cat-opt${addCat===c.id?' selected':''}" onclick="setAddCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function setAddCat(id){ addCat=id; renderAddCatRow(); }

function savePhrase(){
  const jp = document.getElementById('add-jp').value.trim();
  const tlVal = document.getElementById('add-tl').value.trim();
  if(!jp||!tlVal){ alert('日本語と外国語の両方を入力してください'); return; }
  const p = { id:nextCustomId++, cat:addCat, jp, read:'', tl:tlVal, custom:true };
  customPhrases.push(p);
  localStorage.setItem('genba-custom', JSON.stringify(customPhrases));
  localStorage.setItem('genba-next-id', String(nextCustomId));
  document.getElementById('add-jp').value='';
  document.getElementById('add-tl').value='';
  renderCustomList();
  renderPhrases();
  alert('追加しました！');
}

function deleteCustom(id){
  customPhrases = customPhrases.filter(p=>p.id!==id);
  localStorage.setItem('genba-custom', JSON.stringify(customPhrases));
  renderCustomList();
  renderPhrases();
}

function renderCustomList(){
  const wrap = document.getElementById('custom-list');
  if(customPhrases.length===0){ wrap.innerHTML=''; return; }
  wrap.innerHTML = `<div class="add-label" style="margin-bottom:8px;">追加済みフレーズ</div>` +
    customPhrases.map(p=>`
    <div class="custom-item">
      <div><div class="custom-item-text">${p.jp}</div><div class="custom-item-tl">${p.tl}</div></div>
      <button class="del-btn" onclick="deleteCustom(${p.id})">削除</button>
    </div>`).join('');
}

// SCREEN SWITCH
function switchScreen(name){
  ['main','emerg','add'].forEach(s=>{
    document.getElementById('screen-'+s).style.display = s===name?'flex':'none';
  });
  ['main','emerg','add'].forEach(s=>{
    document.getElementById('bn-'+s).classList.toggle('active', s===name);
  });
  if(name==='add'){ renderAddCatRow(); renderCustomList(); renderLangTranslateRow(); checkTranslateReady(); }
}

function closeSheet(){ document.getElementById('sheet-overlay').classList.remove('open'); }

// AUTO TRANSLATE
let translateLang = '';

function renderLangTranslateRow(){
  const row = document.getElementById('lang-translate-row');
  if(!row) return;
  row.innerHTML = activeLangs.map(code => {
    const L = ALL_LANGS[code];
    return `<button class="ltag${translateLang===code?' active':''}" onclick="setTranslateLang('${code}')">${L.flag} ${L.name}</button>`;
  }).join('');
  // auto-select current lang
  if(!translateLang && activeLangs.length>0){
    translateLang = currentLang || activeLangs[0];
    renderLangTranslateRow();
  }
}

function setTranslateLang(code){
  translateLang = code;
  renderLangTranslateRow();
  checkTranslateReady();
}

function onJpInput(){
  checkTranslateReady();
  // clear previous result
  document.getElementById('translate-status').className='translate-status';
  document.getElementById('translate-status').textContent='';
}

function checkTranslateReady(){
  const jp = document.getElementById('add-jp').value.trim();
  const btn = document.getElementById('translate-btn');
  if(btn) btn.disabled = !(jp && translateLang);
}

async function autoTranslate(){
  const jp = document.getElementById('add-jp').value.trim();
  if(!jp || !translateLang) return;

  const btn = document.getElementById('translate-btn');
  const status = document.getElementById('translate-status');
  const L = ALL_LANGS[translateLang];

  btn.disabled = true;
  btn.textContent = '🌐 翻訳中...';
  status.className = 'translate-status loading';
  status.textContent = `${L.flag} ${L.name}に翻訳しています...`;

  // MyMemory API: ja → target lang
  const langMap = {en:'en-US',vi:'vi-VN',id:'id-ID',zh:'zh-CN',tl:'tl-PH',my:'my-MM',th:'th-TH',ne:'ne-NP',km:'km-KH'};
  const targetLang = langMap[translateLang] || translateLang;
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(jp)}&langpair=ja|${targetLang}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    if(data.responseStatus === 200 && data.responseData?.translatedText){
      const result = data.responseData.translatedText;
      document.getElementById('add-tl').value = result;
      status.className = 'translate-status success';
      status.textContent = `✓ ${L.flag} 翻訳完了 — 内容を確認・修正してください`;
    } else {
      throw new Error('translation failed');
    }
  } catch(e) {
    status.className = 'translate-status error';
    status.textContent = '⚠ 翻訳できませんでした。通信を確認するか手動で入力してください。';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🌐 自動翻訳する';
  }
}

// RENDER ALL
function renderAll(){
  renderSwitcher();
  renderCats();
  renderPhrases();
  renderEmerg();
}

// INIT
if(activeLangs.length>0 && currentLang){
  document.getElementById('setup').classList.add('hidden');
  renderAll();
} else {
  initSetupGrid();
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
