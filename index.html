<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場会話">
<link rel="manifest" href="manifest.json">
<title>現場会話</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#1a3a5c;font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;}
#app{max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:#f2f4f7;overflow:hidden;position:relative;}

/* SETUP */
#setup{position:fixed;inset:0;z-index:500;background:#1a3a5c;display:flex;flex-direction:column;overflow:hidden;}
#setup.hidden{display:none;}
.setup-header{padding:max(env(safe-area-inset-top),16px) 20px 12px;flex-shrink:0;}
.setup-progress{display:flex;gap:6px;margin-bottom:12px;}
.sdot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);transition:background 0.3s;}
.sdot.done{background:#7ec8f0;}.sdot.active{background:#fff;}
.setup-step-lbl{color:rgba(255,255,255,0.45);font-size:11px;letter-spacing:0.5px;}
.setup-title{color:#fff;font-size:19px;font-weight:700;margin-top:3px;}
.setup-sub{color:rgba(255,255,255,0.5);font-size:12px;margin-top:3px;line-height:1.5;}
.setup-body{flex:1;overflow-y:auto;padding:4px 16px 8px;-webkit-overflow-scrolling:touch;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.scard{padding:13px 8px;border-radius:13px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;font-family:inherit;text-align:center;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.scard:active{transform:scale(0.96);}
.scard.selected{border-color:#7ec8f0;background:rgba(126,200,240,0.22);}
.scard .si{font-size:26px;}.scard .sn{font-size:12px;font-weight:700;line-height:1.3;}
.scard .ss{font-size:10px;opacity:0.55;line-height:1.2;}
.setup-footer{padding:10px 16px;padding-bottom:max(env(safe-area-inset-bottom),10px);flex-shrink:0;}
.snext{width:100%;padding:13px;border-radius:13px;background:#fff;color:#1a3a5c;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all 0.18s;}
.snext:disabled{opacity:0.3;cursor:default;}
.sback{width:100%;padding:9px;border-radius:11px;background:transparent;color:rgba(255,255,255,0.45);font-size:13px;border:none;cursor:pointer;font-family:inherit;margin-top:7px;}

/* HEADER */
.header{background:#1a3a5c;padding:9px 14px;padding-top:max(env(safe-area-inset-top),9px);flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.app-name{color:#fff;font-size:17px;font-weight:700;}
.header-meta{display:flex;align-items:center;gap:6px;}
.job-chip{background:rgba(255,255,255,0.14);border-radius:20px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,0.85);}
.settings-btn{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;font-family:inherit;}
.lang-sw{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.lang-sw::-webkit-scrollbar{display:none;}
.lbtn{flex:none;display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.18s;}
.lbtn.active{background:#fff;color:#1a3a5c;border-color:#fff;}
.lbtn .lf{font-size:15px;}

/* CATS */
.cats{display:flex;background:#fff;border-bottom:1px solid #e0e6ef;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cbt{flex:none;padding:10px 14px;font-size:12px;font-weight:600;border:none;background:none;color:#94a3b8;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.18s;}
.cbt.active{color:#1a3a5c;border-bottom-color:#1a3a5c;}

/* PHRASE LIST */
.phrase-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 80px;}
.pcard{background:#fff;border:1.5px solid #e0e6ef;border-radius:14px;padding:13px;margin-bottom:8px;cursor:pointer;transition:all 0.18s;position:relative;}
.pcard:active{transform:scale(0.98);}
.pcard.selected{background:#eaf4ff;border-color:#1a3a5c;box-shadow:0 2px 12px rgba(26,58,92,0.12);}
.pcard-jp{font-size:18px;font-weight:700;color:#0d1f35;line-height:1.35;}
.pcard-read{font-size:11px;color:#b0bec5;margin:2px 0 7px;}
.pcard-divider{height:1px;background:#f0f4f8;margin-bottom:7px;}
.pcard-tl{font-size:16px;font-weight:600;color:#1a3a5c;line-height:1.35;}
.pcard.selected .pcard-tl{color:#0a2d52;}
.pcard-btns{display:flex;gap:7px;margin-top:10px;}
.pbtn{flex:1;padding:8px 0;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform 0.12s;}
.pbtn:active{transform:scale(0.95);}
.pbtn-jp{background:#1a3a5c;color:#fff;}
.pbtn-tl{background:#ddeeff;color:#1a3a5c;}
.pcard.selected .pbtn-tl{background:#b8d8f8;}
.empty-state{text-align:center;padding:40px 20px;color:#94a3b8;}
.empty-icon{font-size:36px;margin-bottom:8px;}

/* EMERGENCY */
.emerg-list{flex:1;overflow-y:auto;padding:10px 12px 80px;}
.emerg-top{background:#fff3f3;border:1px solid #ffbaba;border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#c0392b;font-weight:600;}
.ecard{background:#fff;border:1px solid #f5a0a0;border-left:4px solid #e74c3c;border-radius:14px;padding:13px 14px;margin-bottom:9px;}
.ecard:active{transform:scale(0.98);}
.ebadge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:#fde8e8;color:#c0392b;font-weight:700;margin-bottom:5px;}
.ecard-jp{font-size:17px;font-weight:700;color:#0d1f35;}
.ecard-tl{font-size:14px;font-weight:600;color:#1a3a5c;margin-top:5px;}
.ecard-btns{display:flex;gap:8px;margin-top:10px;}
.ebtn{flex:1;padding:9px 0;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;}
.ebtn-jp{background:#1a3a5c;color:#fff;}
.ebtn-tl{background:#ddeeff;color:#1a3a5c;}

/* ADD */
.add-screen{flex:1;overflow-y:auto;padding:14px 14px 80px;}
.add-sec{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #e0e6ef;}
.add-lbl{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
.add-inp{width:100%;padding:11px 12px;border:1.5px solid #e0e6ef;border-radius:10px;font-size:15px;font-family:inherit;color:#0d1f35;background:#f8fafc;outline:none;transition:border-color 0.18s;}
.add-inp:focus{border-color:#1a3a5c;}
.add-inp::placeholder{color:#b0bec5;}
.add-cat-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.acat{padding:6px 13px;border-radius:20px;border:1.5px solid #e0e6ef;background:#fff;color:#1a3a5c;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.acat.selected{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.add-save{width:100%;padding:14px;border-radius:12px;background:#1a3a5c;color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.add-save:active{transform:scale(0.98);}
.tr-btn{width:100%;padding:11px;border-radius:10px;border:1.5px solid #1a3a5c;background:#fff;color:#1a3a5c;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px;}
.tr-btn:disabled{opacity:0.35;cursor:default;}
.tr-st{font-size:12px;margin-top:7px;padding:8px 12px;border-radius:8px;display:none;line-height:1.4;}
.tr-st.loading{display:block;background:#f0f4ff;color:#1a3a5c;}
.tr-st.success{display:block;background:#e8f8ee;color:#0a6644;}
.tr-st.error{display:block;background:#fff0f0;color:#c0392b;}
.ltag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.ltag{padding:5px 12px;border-radius:20px;border:1.5px solid #e0e6ef;background:#fff;color:#1a3a5c;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.ltag.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.custom-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0e6ef;border-radius:10px;padding:11px 13px;margin-bottom:7px;}
.ci-text{font-size:14px;color:#0d1f35;font-weight:600;}
.ci-tl{font-size:12px;color:#94a3b8;margin-top:2px;}
.del-btn{padding:5px 10px;border-radius:8px;border:1px solid #fde8e8;background:#fff5f5;color:#e74c3c;font-size:12px;cursor:pointer;font-family:inherit;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:#fff;border-top:1px solid #e0e6ef;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.bb{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#94a3b8;border:none;background:none;cursor:pointer;font-family:inherit;}
.bb .bi{font-size:20px;}
.bb.active{color:#1a3a5c;}

/* RESPONSIVE */
@media(max-height:700px){.scard{padding:9px 6px;}.scard .si{font-size:22px;}.scard .sn{font-size:11px;}.setup-title{font-size:17px;}.setup-sub{font-size:11px;}}
@media(max-width:375px){.setup-grid{gap:7px;}.scard .sn{font-size:11px;}}
</style>
</head>
<body>
<div id="app">

<!-- SETUP WIZARD -->
<div id="setup">
  <div class="setup-header">
    <div class="setup-progress">
      <div class="sdot active" id="dot1"></div>
      <div class="sdot" id="dot2"></div>
    </div>
    <div class="setup-step-lbl" id="slbl">STEP 1 / 2</div>
    <div class="setup-title" id="stitle">職種を選んでください</div>
    <div class="setup-sub" id="ssub">Job Category — あなたの現場はどれですか？</div>
  </div>
  <div class="setup-body" id="sbody"></div>
  <div class="setup-footer">
    <button class="snext" id="snext" onclick="setupNext()" disabled>次へ →</button>
    <button class="sback" id="sback" onclick="setupBack()" style="display:none">← 戻る</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="header">
  <div class="header-top">
    <div class="app-name">現場会話</div>
    <div class="header-meta">
      <div class="job-chip" id="job-chip"></div>
      <button class="settings-btn" onclick="showSetup()">設定 ⚙</button>
    </div>
  </div>
  <div class="lang-sw" id="lang-sw"></div>
</div>

<div class="cats" id="cats"></div>

<div id="sc-main" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
  <div class="phrase-list" id="phrase-list"></div>
</div>
<div id="sc-emerg" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="emerg-list">
    <div class="emerg-top">🚨 タップで音声再生 — オフライン対応</div>
    <div id="emerg-list"></div>
  </div>
</div>
<div id="sc-add" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
  <div class="add-screen">
    <div class="add-sec">
      <div class="add-lbl">① 日本語フレーズを入力</div>
      <input class="add-inp" id="add-jp" type="text" placeholder="例：休憩してください" oninput="onJpInput()">
      <div class="add-lbl" style="margin-top:12px;">② 翻訳する言語を選択</div>
      <div class="ltag-row" id="ltag-row"></div>
      <button class="tr-btn" id="tr-btn" onclick="autoTranslate()" disabled>🌐 自動翻訳する</button>
      <div class="tr-st" id="tr-st"></div>
      <div class="add-lbl" style="margin-top:12px;">③ 翻訳結果（修正可）</div>
      <input class="add-inp" id="add-tl" type="text" placeholder="翻訳後に自動入力されます">
      <div class="add-lbl" style="margin-top:12px;">④ カテゴリー</div>
      <div class="add-cat-row" id="add-cat-row"></div>
    </div>
    <button class="add-save" onclick="savePhrase()">＋ 追加する</button>
    <div id="custom-list" style="margin-top:12px;"></div>
  </div>
</div>

<div class="bnav">
  <button class="bb active" id="bn-main" onclick="switchScreen('main')"><span class="bi">💬</span>会話</button>
  <button class="bb" id="bn-emerg" onclick="switchScreen('emerg')"><span class="bi">🚨</span>緊急</button>
  <button class="bb" id="bn-add" onclick="switchScreen('add')"><span class="bi">＋</span>追加</button>
</div>
</div>

  {id:608,jobs:['agriculture'],cat:'work',  jp:'仕分けをしてください',           read:'しわけをしてください',           t:{en:'Please sort them',vi:'Phân loại',id:'Sortir',zh:'请分类',tl:'I-sort',my:'စီခွဲပေးပါ',th:'คัดแยก',ne:'छान्नुस्',km:'ចែកប្រភេទ'}},
  {id:609,jobs:['agriculture'],cat:'work',  jp:'網を確認してください',           read:'あみをかくにんしてください',     t:{en:'Please check the net',vi:'Kiểm tra lưới',id:'Cek jaring',zh:'检查网',tl:'I-check ang net',my:'ကွန်စစ်ပေးပါ',th:'ตรวจสอบตาข่าย',ne:'जाल जाँच गर्नुस्',km:'ពិនិត្យអន្ទាញ'}},
];

const EMERG = [
  {badge:'危険',jp:'危ない！止まれ！',  t:{en:'Danger! Stop!',vi:'Nguy hiểm! Dừng!',id:'Bahaya! Berhenti!',zh:'危险！停！',tl:'Panganib! Hinto!',my:'အန္တရာယ်! ရပ်!',th:'อันตราย! หยุด!',ne:'खतरा! रोक!',km:'គ្រោះថ្នាក់! ឈប់!'}},
  {badge:'緊急',jp:'助けてください！',  t:{en:'Help me!',vi:'Giúp tôi!',id:'Tolong!',zh:'救命！',tl:'Saklolo!',my:'ကူညီပါ!',th:'ช่วยด้วย!',ne:'मद्दत!',km:'ជួយខ្ញុំ!'}},
  {badge:'怪我',jp:'怪我をしました',    t:{en:'I am injured',vi:'Tôi bị thương',id:'Saya terluka',zh:'我受伤了',tl:'Nasugatan ako',my:'ဒဏ်ရာရသည်',th:'ฉันบาดเจ็บ',ne:'म चोटिएको छु',km:'ខ្ញុំរបួស'}},
  {badge:'火災',jp:'火事です！',        t:{en:'Fire!',vi:'Cháy!',id:'Kebakaran!',zh:'着火了！',tl:'Sunog!',my:'မီးလောင်!',th:'ไฟไหม้!',ne:'आगो!',km:'ភ្លើងឆេះ!'}},
  {badge:'',    jp:'気分が悪いです',    t:{en:"I don't feel well",vi:'Tôi không khỏe',id:'Saya tidak enak badan',zh:'我不舒服',tl:'Hindi ako maayos',my:'မကောင်းပါ',th:'ไม่สบาย',ne:'मलाई राम्रो लागेन',km:'ខ្ញុំមិនស្រួល'}},
  {badge:'',    jp:'電話してください',  t:{en:'Please call someone',vi:'Gọi điện đi',id:'Tolong telepon',zh:'请打电话',tl:'Tumawag',my:'ဖုန်းခေါ်ပေးပါ',th:'โทรหาคน',ne:'फोन गर्नुस्',km:'ជួយទូរស័ព្ទ'}},
];

// カテゴリー定義（職種ごとに使うものだけ動的表示）
const CAT_DEFS = [
  {id:'all',    label:'すべて'},
  {id:'basic',  label:'基本'},
  {id:'work',   label:'作業指示'},
  {id:'safety', label:'安全'},
  {id:'quality',label:'品質確認'},
  {id:'tools',  label:'工具'},
  {id:'reply',  label:'返答'},
];

/* ══ STATE ══ */
let selectedJob   = localStorage.getItem('genba-job')     || '';
let activeLangs   = JSON.parse(localStorage.getItem('genba-langs')   || '[]');
let currentLang   = localStorage.getItem('genba-current') || '';
let cat           = 'all';
let selectedCard  = null;
let addCat        = 'work';
let tlLang        = '';
let customPhrases = JSON.parse(localStorage.getItem('genba-custom')  || '[]');
let nextId        = parseInt(localStorage.getItem('genba-next-id')   || '1000');
let setupStep     = 1;
let setupJob      = '';
let setupLangs    = new Set();

/* ══ SETUP ══ */
function renderStep1() {
  setupStep = 1;
  document.getElementById('dot1').className = 'sdot active';
  document.getElementById('dot2').className = 'sdot';
  document.getElementById('slbl').textContent  = 'STEP 1 / 2';
  document.getElementById('stitle').textContent = '職種を選んでください';
  document.getElementById('ssub').textContent   = 'Job Category — あなたの現場はどれですか？';
  document.getElementById('snext').textContent  = '次へ →';
  document.getElementById('snext').disabled     = !setupJob;
  document.getElementById('sback').style.display = 'none';
  document.getElementById('sbody').innerHTML = `<div class="setup-grid">${
    JOBS.map(j=>`<button class="scard${setupJob===j.id?' selected':''}" onclick="selJob('${j.id}',this)">
      <span class="si">${j.icon}</span><span class="sn">${j.name}</span><span class="ss">${j.sub}</span>
    </button>`).join('')}</div>`;
}

function renderStep2() {
  setupStep = 2;
  document.getElementById('dot1').className = 'sdot done';
  document.getElementById('dot2').className = 'sdot active';
  document.getElementById('slbl').textContent  = 'STEP 2 / 2';
  document.getElementById('stitle').textContent = '言語を選んでください';
  document.getElementById('ssub').textContent   = 'Language — 複数選択できます';
  document.getElementById('snext').textContent  = 'はじめる ✓';
  document.getElementById('snext').disabled     = setupLangs.size === 0;
  document.getElementById('sback').style.display = 'block';
  document.getElementById('sbody').innerHTML = `<div class="setup-grid">${
    Object.entries(ALL_LANGS).map(([c,L])=>`<button class="scard${setupLangs.has(c)?' selected':''}" onclick="togLang('${c}')">
      <span class="si">${L.flag}</span><span class="sn">${L.name}</span><span class="ss">${c.toUpperCase()}</span>
    </button>`).join('')}</div>`;
}

function selJob(id, el) {
  setupJob = id;
  document.querySelectorAll('.scard').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('snext').disabled = false;
}
function togLang(c) {
  setupLangs.has(c) ? setupLangs.delete(c) : setupLangs.add(c);
  renderStep2();
}
function setupNext() {
  if (setupStep===1) { if(setupJob) renderStep2(); }
  else {
    if (setupLangs.size===0) return;
    selectedJob = setupJob; activeLangs = [...setupLangs]; currentLang = activeLangs[0];
    localStorage.setItem('genba-job', selectedJob);
    localStorage.setItem('genba-langs', JSON.stringify(activeLangs));
    localStorage.setItem('genba-current', currentLang);
    document.getElementById('setup').classList.add('hidden');
    renderAll();
  }
}
function setupBack() { renderStep1(); }
function showSetup() {
  setupJob = selectedJob; setupLangs = new Set(activeLangs); renderStep1();
  document.getElementById('setup').classList.remove('hidden');
}

/* ══ HELPERS ══ */
function T(p){ return p.t?(p.t[currentLang]||p.t.en||''):(p.tl||''); }
function BCP(){ return ALL_LANGS[currentLang]?.bcp||'en-US'; }
function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function speak(txt,lng){ if(!window.speechSynthesis)return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(txt); u.lang=lng||'ja-JP'; u.rate=0.85; speechSynthesis.speak(u); }
function jobMatch(p){ return p.jobs==='all'||(Array.isArray(p.jobs)&&p.jobs.includes(selectedJob)); }

/* ══ HEADER ══ */
function renderHeader() {
  const j = JOBS.find(x=>x.id===selectedJob);
  document.getElementById('job-chip').textContent = j?j.icon+' '+j.name:'';
  document.getElementById('lang-sw').innerHTML = activeLangs.map(c=>{
    const L=ALL_LANGS[c];
    return `<button class="lbtn${c===currentLang?' active':''}" onclick="switchLang('${c}')"><span class="lf">${L.flag}</span>${L.name}</button>`;
  }).join('');
}
function switchLang(c){ currentLang=c; localStorage.setItem('genba-current',c); renderHeader(); renderPhrases(); renderEmerg(); }

/* ══ CATEGORIES（職種で使うものだけ表示）══ */
function getActiveCats() {
  const all = [...PHRASES,...customPhrases].filter(jobMatch);
  const used = new Set(all.map(p=>p.cat));
  return CAT_DEFS.filter(c=>c.id==='all'||used.has(c.id));
}
function renderCats() {
  const active = getActiveCats();
  // catが存在しないカテゴリなら'all'にリセット
  if (!active.find(c=>c.id===cat)) cat='all';
  document.getElementById('cats').innerHTML = active.map(c=>
    `<button class="cbt${c.id===cat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}
function setCat(id){ cat=id; selectedCard=null; renderCats(); renderPhrases(); }

/* ══ PHRASES ══ */
function renderPhrases() {
  const list = [...PHRASES,...customPhrases].filter(p=>jobMatch(p)&&(cat==='all'||p.cat===cat));
  if (!list.length) {
    document.getElementById('phrase-list').innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div>フレーズがありません</div></div>`;
    return;
  }
  document.getElementById('phrase-list').innerHTML = list.map(p=>{
    const tlTxt = T(p);
    return `<div class="pcard${selectedCard===p.id?' selected':''}" id="pc-${p.id}" onclick="selCard(${p.id})">
      <div class="pcard-jp">${p.jp}</div>
      <div class="pcard-read">${p.read||''}</div>
      <div class="pcard-divider"></div>
      <div class="pcard-tl">${tlTxt}</div>
      <div class="pcard-btns">
        <button class="pbtn pbtn-jp" onclick="event.stopPropagation();speak('${esc(p.jp)}','ja-JP')">🔊 日本語</button>
        <button class="pbtn pbtn-tl" onclick="event.stopPropagation();speak('${esc(tlTxt)}','${BCP()}')">🔊 ${ALL_LANGS[currentLang]?.name||'EN'}</button>
      </div>
    </div>`;
  }).join('');
}
function selCard(id){
  const p=[...PHRASES,...customPhrases].find(x=>x.id===id); if(!p)return;
  if(selectedCard===id){ selectedCard=null; document.getElementById('pc-'+id)?.classList.remove('selected'); return; }
  if(selectedCard) document.getElementById('pc-'+selectedCard)?.classList.remove('selected');
  selectedCard=id; document.getElementById('pc-'+id)?.classList.add('selected');
  const tlTxt=T(p); speechSynthesis.cancel();
  const uj=new SpeechSynthesisUtterance(p.jp); uj.lang='ja-JP'; uj.rate=0.85;
  const ut=new SpeechSynthesisUtterance(tlTxt); ut.lang=BCP(); ut.rate=0.85;
  uj.onend=()=>setTimeout(()=>speechSynthesis.speak(ut),300);
  speechSynthesis.speak(uj);
}

/* ══ EMERGENCY ══ */
function renderEmerg(){
  document.getElementById('emerg-list').innerHTML=EMERG.map(e=>{
    const tl=e.t[currentLang]||e.t.en;
    return `<div class="ecard">
      ${e.badge?`<div class="ebadge">${e.badge}</div>`:''}
      <div class="ecard-jp">${e.jp}</div><div class="ecard-tl">${tl}</div>
      <div class="ecard-btns">
        <button class="ebtn ebtn-jp" onclick="speak('${esc(e.jp)}','ja-JP')">🔊 日本語</button>
        <button class="ebtn ebtn-tl" onclick="speak('${esc(tl)}','${BCP()}')">🔊 ${ALL_LANGS[currentLang]?.name||'EN'}</button>
      </div></div>`;
  }).join('');
}

/* ══ ADD ══ */
function renderLtagRow(){
  if(!tlLang&&activeLangs.length) tlLang=currentLang||activeLangs[0];
  const r=document.getElementById('ltag-row'); if(!r)return;
  r.innerHTML=activeLangs.map(c=>{const L=ALL_LANGS[c];return`<button class="ltag${tlLang===c?' active':''}" onclick="setTlLang('${c}')">${L.flag} ${L.name}</button>`;}).join('');
}
function setTlLang(c){ tlLang=c; renderLtagRow(); chkTr(); }
function onJpInput(){ chkTr(); document.getElementById('tr-st').className='tr-st'; }
function chkTr(){ const jp=document.getElementById('add-jp').value.trim(); const b=document.getElementById('tr-btn'); if(b)b.disabled=!(jp&&tlLang); }
async function autoTranslate(){
  const jp=document.getElementById('add-jp').value.trim(); if(!jp||!tlLang)return;
  const btn=document.getElementById('tr-btn'),st=document.getElementById('tr-st'),L=ALL_LANGS[tlLang];
  btn.disabled=true; btn.textContent='🌐 翻訳中...';
  st.className='tr-st loading'; st.textContent=`${L.flag} ${L.name}に翻訳しています...`;
  const lm={en:'en-US',vi:'vi-VN',id:'id-ID',zh:'zh-CN',tl:'tl-PH',my:'my-MM',th:'th-TH',ne:'ne-NP',km:'km-KH'};
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(jp)}&langpair=ja|${lm[tlLang]||tlLang}`);
    const d=await r.json();
    if(d.responseStatus===200&&d.responseData?.translatedText){
      document.getElementById('add-tl').value=d.responseData.translatedText;
      st.className='tr-st success'; st.textContent=`✓ ${L.flag} 翻訳完了 — 確認・修正してください`;
    } else throw 0;
  } catch{ st.className='tr-st error'; st.textContent='⚠ 翻訳できませんでした。手動で入力してください。'; }
  finally{ btn.disabled=false; btn.innerHTML='🌐 自動翻訳する'; }
}
function renderAddCatRow(){
  // 現在の職種で使うカテゴリーのみ
  const activeCatIds = new Set(getActiveCats().map(c=>c.id));
  document.getElementById('add-cat-row').innerHTML = CAT_DEFS
    .filter(c=>c.id!=='all'&&activeCatIds.has(c.id))
    .map(c=>`<button class="acat${addCat===c.id?' selected':''}" onclick="setAddCat('${c.id}')">${c.label}</button>`).join('');
}
function setAddCat(id){ addCat=id; renderAddCatRow(); }
function savePhrase(){
  const jp=document.getElementById('add-jp').value.trim(), tl=document.getElementById('add-tl').value.trim();
  if(!jp||!tl){alert('日本語と外国語の両方を入力してください');return;}
  const p={id:nextId++,jobs:'all',cat:addCat,jp,read:'',tl,custom:true};
  customPhrases.push(p);
  localStorage.setItem('genba-custom',JSON.stringify(customPhrases));
  localStorage.setItem('genba-next-id',String(nextId));
  document.getElementById('add-jp').value=''; document.getElementById('add-tl').value='';
  document.getElementById('tr-st').className='tr-st';
  renderCustomList(); renderPhrases(); renderCats();
  alert('追加しました！');
}
function deleteCustom(id){
  customPhrases=customPhrases.filter(p=>p.id!==id);
  localStorage.setItem('genba-custom',JSON.stringify(customPhrases));
  renderCustomList(); renderPhrases(); renderCats();
}
function renderCustomList(){
  const w=document.getElementById('custom-list'); if(!w)return;
  if(!customPhrases.length){w.innerHTML='';return;}
  w.innerHTML=`<div class="add-lbl" style="margin-bottom:8px;">追加済みフレーズ</div>`+
    customPhrases.map(p=>`<div class="custom-item">
      <div><div class="ci-text">${p.jp}</div><div class="ci-tl">${p.tl}</div></div>
      <button class="del-btn" onclick="deleteCustom(${p.id})">削除</button>
    </div>`).join('');
}

/* ══ SCREEN ══ */
function switchScreen(n){
  ['main','emerg','add'].forEach(s=>{
    document.getElementById('sc-'+s).style.display=s===n?'flex':'none';
    document.getElementById('bn-'+s).classList.toggle('active',s===n);
  });
  if(n==='add'){renderAddCatRow();renderCustomList();renderLtagRow();chkTr();}
}

/* ══ INIT ══ */
function renderAll(){ renderHeader(); renderCats(); renderPhrases(); renderEmerg(); }

if(selectedJob&&activeLangs.length>0&&currentLang){
  document.getElementById('setup').classList.add('hidden');
  renderAll();
} else {
  setupJob=selectedJob; setupLangs=new Set(activeLangs); renderStep1();
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
