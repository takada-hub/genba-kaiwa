name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build TWA
        run: |
          bubblewrap init \
            --manifest=https://takada-hub.github.io/genba-kaiwa/manifest.json \
            --directory=./twa
          cd twa
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: genba-kaiwa-apk
          path: |
            twa/app-release-signed.apk
            twa/app-release-unsigned.apk
