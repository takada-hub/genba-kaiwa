name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android TWA Project
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/xml
          mkdir -p twa/gradle/wrapper

          cat > twa/settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > twa/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          EOF

          cat > twa/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.takadahub.genbakaiwa"
                  minSdkVersion 19
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.4.0'
          }
          EOF

          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">現場会話</string>
              <string name="launcher_name">現場会話</string>
              <string name="asset_statements">[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"web","site":"https://takada-hub.github.io"}}]</string>
              <string name="default_url">https://takada-hub.github.io/genba-kaiwa/</string>
              <string name="host">takada-hub.github.io</string>
              <string name="pathPrefix">/genba-kaiwa/</string>
          </resources>
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="@string/app_name">
                  <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data android:name="android.support
