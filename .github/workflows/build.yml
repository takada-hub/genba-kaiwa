name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        env:
          SKIP_JDK_VERSION_CHECK: true

      - name: Clone TWA Template
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa
          cd twa
          find . -name "strings.xml"
          find . -name "*.gradle"

      - name: Show file structure
        run: |
          cd twa
          ls -la
          ls -la app/ || true
          ls -la app/src/ || true
          ls -la app/src/main/ || true
          ls -la app/src/main/res/ || true
          ls -la app/src/main/res/values/ || true

      - name: Upload structure info
        uses: actions/upload-artifact@v4
        with:
          name: debug-info
          path: twa/
