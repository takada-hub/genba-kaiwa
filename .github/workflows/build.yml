name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        env:
          SKIP_JDK_VERSION_CHECK: true

      - name: Clone TWA Template
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa
          cd twa
          find . -name "strings.xml" | head -5
          ls app/src/main/

      - name: Update App Settings
        run: |
          cd twa
          STRINGS_FILE=$(find . -name "strings.xml" | head -1)
          echo "Found: $STRINGS_FILE"
          cat $STRINGS_FILE
          sed -i 's|https://svgomg.net|https://takada-hub.github.io/genba-kaiwa/|g' $STRINGS_FILE
          sed -i 's|SVGOMG TWA|現場会話|g' $STRINGS_FILE
          sed -i 's|gradle-4.6-all|gradle-8.0-all|g' gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: |
          cd twa
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: genba-kaiwa-apk
          path: twa/app/build/outputs/apk/release/
