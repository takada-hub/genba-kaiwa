name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        env:
          SKIP_JDK_VERSION_CHECK: true

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create Android TWA Project
        run: |
          mkdir -p twa/app/src/main/res/values

          cat > twa/settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > twa/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > twa/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.takadahub.genbakaiwa'
              compileSdk 33
              defaultConfig {
                  applicationId "com.takadahub.genbakaiwa"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.4.0'
          }
          EOF

          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">現場会話</string>
              <string name="default_url">https://takada-hub.github.io/genba-kaiwa/</string>
              <string name="host">takada-hub.github.io</string>
          </resources>
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="@string/app_name">
                  <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="@string/default_url"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build AAB
        run: |
          cd twa
          gradle bundleRelease
          find . -name "*.aab" -type f

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: genba-kaiwa-aab
          path: twa/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
