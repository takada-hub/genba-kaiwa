name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        env:
          SKIP_JDK_VERSION_CHECK: true

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Naoki Takada, OU=Dev, O=Takada, L=Osaka, S=Osaka, C=JP"

      - name: Create Android TWA Project
        run: |
          mkdir -p twa/app/src/main/res/values

          cat > twa/settings.gradle << 'GRADLEEOF'
          include ':app'
          GRADLEEOF

          cat > twa/build.gradle << 'GRADLEEOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLEEOF

          cat > twa/gradle.properties << 'GRADLEEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          GRADLEEOF

          cat > twa/app/build.gradle << 'GRADLEEOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.takadahub.genbakaiwa'
              compileSdk 33
              defaultConfig {
                  applicationId "com.takadahub.genbakaiwa"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("../../keystore.jks")
                      storePassword "android123"
                      keyAlias "android"
                      keyPassword "android123"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.4.0'
          }
          GRADLEEOF

          cat > twa/app/src/main/res/values/strings.xml << 'GRADLEEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">現場会話</string>
              <string name="default_url">https://takada-hub.github.io/genba-kaiwa/</string>
              <string name="host">takada-hub.github.io</string>
          </resources>
          GRADLEEOF

          cat > twa/app/src/main/AndroidManifest.xml << 'GRADLEEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="@string/app_name">
                  <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="@string/default_url"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          GRADLEEOF

      - name: Build and Sign AAB
        run: |
          cd twa
          gradle bundleRelease
          echo "=== AAB files ==="
          find . -name "*.aab" -type f
          echo "=== Signing AAB ==="
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore ../keystore.jks \
            -storepass android123 \
            -keypass android123 \
            app/build/outputs/bundle/release/app-release.aab \
            android
          echo "=== Verify signing ==="
          jarsigner -verify app/build/outputs/bundle/release/app-release.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: genba-kaiwa-aab
          path: twa/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
